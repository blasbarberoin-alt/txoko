function Inversiones({socios, cenas, inversiones, setInversiones, derramas, setDerramas, devoluciones, setDevoluciones, readonly}){
  const [tab, setTab] = useState("iniciales");
  const [modalInv, setModalInv] = useState(false);
  const [modalDerrama, setModalDerrama] = useState(false);
  const [modalDev, setModalDev] = useState(false);
  const [formInv, setFormInv] = useState({concepto:"", importe:"", categoria:"Mobiliario", socioId:""});
  const [formDerrama, setFormDerrama] = useState({concepto:"", importe:"", socioId:"", fecha:""});
  const [formDev, setFormDev] = useState({socioId:"", importe:"", concepto:"", fecha:"", origen:"Superavit cena"});

  // -- CALCULOS -----------------------------------------------------------------
  // Total adelantado por cada socio (inversiones + derramas)
  const totalAdelantado = (socioId) => {
    // Suma lo que aport- este socio en inversiones iniciales (puede ser parcial)
    const deInv = inversiones.reduce((s,i)=>{
      const ap = (i.aportantes||[]).find(a=>a.socioId===socioId);
      return s + (ap ? ap.importe : 0);
    },0);
    const deDer = derramas.reduce((s,d)=>{
      const ap=(d.aportantes||[]).find(a=>a.socioId===socioId);
      // fallback: old single socioId format
      if(ap) return s+ap.importe;
      if(d.socioId===socioId) return s+d.importe;
      return s;
    },0);
    return deInv + deDer;
  };
  // Total devuelto a cada socio
  const totalDevuelto = (socioId) =>
    devoluciones.filter(d=>d.socioId===socioId).reduce((s,d)=>s+d.importe,0);
  // Saldo pendiente (positivo = se le debe)
  const saldoPendiente = (socioId) => totalAdelantado(socioId) - totalDevuelto(socioId);

  // Suma de superavits de cenas
  const totalSuperavit = cenas.reduce((s,c)=>{
    const r = calcCena(c);
    return s + (r.resultado > 0 ? r.resultado : 0);
  },0);

  const totalAdelantos = inversiones.reduce((s,i)=>s+i.importe,0) + derramas.reduce((s,d)=>s+d.importe,0);
  const totalDevueltoGlobal = devoluciones.reduce((s,d)=>s+d.importe,0);
  const saldoGlobal = totalAdelantos - totalDevueltoGlobal;

  const CATEGORIAS = ["Mobiliario","Tecnologia","Menaje","Cocina","Electrodomesticos","Administracion","Ocio","Otros"];
  const ORIGENES   = ["Superavit cena","Incorporacion nuevo socio","Aportacion extraordinaria","Otro"];

  const guardarInversion = () => {
    if(!formInv.concepto.trim()||!formInv.importe) return;
    const nueva = {id:Date.now(), concepto:formInv.concepto.trim(), importe:parseFloat(formInv.importe)||0, categoria:formInv.categoria, aportantes:[]};
    setInversiones(p=>[...p,nueva]);
    setModalInv(false); setFormInv({concepto:"",importe:"",categoria:"Mobiliario",socioId:""});
  };
  const guardarDerrama = () => {
    if(!formDerrama.concepto.trim()||!formDerrama.importe) return;
    const nueva = {id:Date.now(), concepto:formDerrama.concepto.trim(), importe:parseFloat(formDerrama.importe)||0, aportantes:[], fecha:formDerrama.fecha||new Date().toISOString().slice(0,10)};
    setDerramas(p=>[...p,nueva]);
    setModalDerrama(false); setFormDerrama({concepto:"",importe:"",fecha:""});
  };
  const addAportanteDerrama = (derrId, socioId, importe) => {
    if(!socioId||!importe) return;
    setDerramas(p=>p.map(d=>{
      if(d.id!==derrId) return d;
      const exists=(d.aportantes||[]).find(a=>a.socioId===socioId);
      if(exists) return d;
      return {...d, aportantes:[...(d.aportantes||[]),{socioId:parseInt(socioId),importe:parseFloat(importe)||0}]};
    }));
  };
  const removeAportanteDerrama = (derrId, socioId) =>
    setDerramas(p=>p.map(d=>d.id!==derrId?d:{...d,aportantes:(d.aportantes||[]).filter(a=>a.socioId!==socioId)}));
  const [aportFormDerrama, setAportFormDerrama] = useState({});
  const guardarDevolucion = () => {
    if(!formDev.socioId||!formDev.importe) return;
    const nueva = {id:Date.now(), socioId:parseInt(formDev.socioId), importe:parseFloat(formDev.importe)||0, concepto:formDev.concepto||formDev.origen, fecha:formDev.fecha||new Date().toISOString().slice(0,10), origen:formDev.origen};
    setDevoluciones(p=>[...p,nueva]);
    setModalDev(false); setFormDev({socioId:"",importe:"",concepto:"",fecha:"",origen:"Superavit cena"});
  };
  const addAportante = (invId, socioId, importe) => {
    if(!socioId||!importe) return;
    setInversiones(p=>p.map(i=>{
      if(i.id!==invId) return i;
      const exists = (i.aportantes||[]).find(a=>a.socioId===socioId);
      if(exists) return i; // ya esta
      return {...i, aportantes:[...(i.aportantes||[]),{socioId:parseInt(socioId),importe:parseFloat(importe)||0}]};
    }));
  };
  const removeAportante = (invId, socioId) =>
    setInversiones(p=>p.map(i=>i.id!==invId?i:{...i,aportantes:(i.aportantes||[]).filter(a=>a.socioId!==socioId)}));
  const [aportForm, setAportForm] = useState({});  // {invId: {socioId:'', importe:''}}
  const eliminarDevolucion = (id) =>
    setDevoluciones(p=>p.filter(d=>d.id!==id));

  // -- RENDER -------------------------------------------------------------------
  return(
    <div>
      {/* Header */}
      <div style={{background:C.wineD,padding:"14px"}}>
        <div style={{fontFamily:"Georgia,serif",fontSize:18,fontWeight:900,color:"#fff"}}>Inversiones</div>
        <div style={{fontSize:11,color:"rgba(255,255,255,0.45)",marginTop:3}}>
          Adelantado: {fmt(totalAdelantos)} . Devuelto: {fmt(totalDevueltoGlobal)} . Pendiente: {fmt(saldoGlobal)}
        </div>
      </div>

      {/* KPIs globales */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,padding:"12px 12px 0"}}>
        {[[fmt(totalAdelantos),"Total adelantado",C.wine],[fmt(totalDevueltoGlobal),"Devuelto",C.green],[fmt(saldoGlobal),"Por devolver",saldoGlobal>0?C.amber:C.green]].map(([v,l,c])=>(
          <div key={l} style={{...Cd,textAlign:"center",borderTop:`3px solid ${c}`,marginBottom:0,padding:"10px 6px"}}>
            <div style={{fontSize:9,color:C.textS,textTransform:"uppercase",marginBottom:4}}>{l}</div>
            <div style={{fontSize:16,fontWeight:900,color:c}}>{v}</div>
          </div>
        ))}
      </div>

      {/* Superavit disponible */}
      {totalSuperavit>0&&(
        <div style={{margin:"10px 12px 0",background:C.greenL,borderLeft:`3px solid ${C.green}`,borderRadius:8,padding:"9px 12px",fontSize:12}}>
          <span style={{color:C.textS}}>Superavit acumulado en cenas disponible para devoluciones: </span>
          <span style={{fontWeight:800,color:C.green}}>{fmt(totalSuperavit)}</span>
        </div>
      )}

      {/* Tabs */}
      <div style={{padding:"12px 12px 0"}}>
        <div style={{display:"flex",background:C.surface,borderRadius:10,padding:3,border:`1px solid ${C.border}`,marginBottom:14}}>
          {[["iniciales","Iniciales"],["derramas","Derramas"],["balance","Balance"],["devoluciones","Devoluciones"]].map(([k,l])=>(
            <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:"8px 2px",borderRadius:7,border:"none",background:tab===k?C.wine:"transparent",color:tab===k?"#fff":C.textS,cursor:"pointer",fontWeight:700,fontSize:10,fontFamily:"inherit"}}>
              {l}
            </button>
          ))}
        </div>

        {/* -- INVERSIONES INICIALES ------------------------------------------- */}
        {tab==="iniciales"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{fontWeight:700,fontSize:13,color:C.text}}>Inversiones iniciales - {fmt(inversiones.reduce((s,i)=>s+i.importe,0))}</div>
              {!readonly&&<button onClick={()=>setModalInv(true)} style={{...Btn(C.wine),padding:"6px 12px",fontSize:11}}>+ Anadir</button>}
            </div>
            {inversiones.map(inv=>{
              const s=socios.find(x=>x.id===inv.socioId);
              return(
                <div key={inv.id} style={{...Cd,borderLeft:`3px solid ${inv.socioId?C.green:C.border}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:inv.socioId||!readonly?8:0}}>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:13}}>{inv.concepto}</div>
                      <div style={{fontSize:10,color:C.textS,marginTop:2}}>{inv.categoria}</div>
                    </div>
                    <div style={{fontWeight:800,fontSize:15,color:C.wine,marginLeft:10}}>{fmt(inv.importe)}</div>
                  </div>
                  {/* Aportantes actuales */}
                  {(inv.aportantes||[]).length>0&&(
                    <div style={{marginBottom:8}}>
                      <div style={{fontSize:10,color:C.textS,textTransform:"uppercase",marginBottom:4}}>Adelantado por:</div>
                      {(inv.aportantes||[]).map((ap,ai)=>{
                        const aSocio=socios.find(x=>x.id===ap.socioId);
                        return(
                          <div key={ai} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:C.greenL,borderRadius:6,padding:"5px 10px",marginBottom:3}}>
                            <span style={{fontSize:12,fontWeight:700,color:C.green}}>{aSocio?.nombre}</span>
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                              <span style={{fontWeight:800,color:C.wine,fontSize:13}}>{fmt(ap.importe)}</span>
                              {!readonly&&<button onClick={()=>removeAportante(inv.id,ap.socioId)} style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:14,padding:"0 2px"}}>x</button>}
                            </div>
                          </div>
                        );
                      })}
                      {(inv.aportantes||[]).length>1&&(
                        <div style={{fontSize:10,color:C.textS,textAlign:"right",marginTop:2}}>
                          Total asignado: {fmt((inv.aportantes||[]).reduce((s,a)=>s+a.importe,0))} / {fmt(inv.importe)}
                        </div>
                      )}
                    </div>
                  )}
                  {!readonly&&(()=>{
                    const af=aportForm[inv.id]||{socioId:"",importe:""};
                    const yaAsignados=(inv.aportantes||[]).map(a=>a.socioId);
                    const disponibles=socios.filter(s=>!yaAsignados.includes(s.id));
                    if(disponibles.length===0) return <div style={{fontSize:11,color:C.green,fontWeight:700}}>Todos los socios asignados</div>;
                    return(
                      <div style={{background:C.cream,borderRadius:8,padding:"8px 10px",borderTop:`1px solid ${C.border}`}}>
                        <div style={{fontSize:10,color:C.textS,textTransform:"uppercase",marginBottom:6}}>Anadir aportante:</div>
                        {/* Boton todos los socios con aportacion inicial */}
                        {disponibles.length===socios.length&&(
                          <button onClick={()=>{
                            socios.forEach(s=>addAportante(inv.id,s.id,APORTACION_INI));
                          }} style={{...Btn(C.blue),width:"100%",padding:"8px",fontSize:11,marginBottom:8}}>
                            Todos los socios ({fmt(APORTACION_INI)} c/u = {fmt(socios.length*APORTACION_INI)})
                          </button>
                        )}
                        <div style={{display:"flex",gap:6,alignItems:"center"}}>
                          <select value={af.socioId} onChange={e=>setAportForm(p=>({...p,[inv.id]:{...af,socioId:e.target.value}}))}
                            style={{...Ip,flex:2,fontSize:11,padding:"5px 6px"}}>
                            <option value="">Socio</option>
                            {disponibles.map(s=><option key={s.id} value={s.id}>{s.nombre}</option>)}
                          </select>
                          <input type="number" placeholder="Importe" value={af.importe}
                            onChange={e=>setAportForm(p=>({...p,[inv.id]:{...af,importe:e.target.value}}))}
                            style={{...Ip,flex:1,fontSize:11,padding:"5px 6px"}}/>
                          <button onClick={()=>{addAportante(inv.id,af.socioId,af.importe);setAportForm(p=>({...p,[inv.id]:{socioId:"",importe:""}}));}}
                            style={{...Btn(C.wine),padding:"6px 10px",fontSize:11,flexShrink:0}}>+</button>
                        </div>
                      </div>
                    );
                  })()}
                </div>
              );
            })}
            <div style={{...Cd,background:C.wine+"08",borderColor:C.wine+"30"}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:14,fontWeight:900,color:C.wine}}>
                <span>TOTAL INVERSIONES</span>
                <span>{fmt(inversiones.reduce((s,i)=>s+i.importe,0))}</span>
              </div>
              <div style={{fontSize:11,color:C.textS,marginTop:4}}>
                Cuota por socio ({socios.length} socios): {fmt(inversiones.reduce((s,i)=>s+i.importe,0)/socios.length)}
              </div>
            </div>
          </div>
        )}

        {/* -- DERRAMAS -------------------------------------------------------- */}
        {tab==="derramas"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{fontWeight:700,fontSize:13}}>Derramas - {fmt(derramas.reduce((s,d)=>s+d.importe,0))}</div>
              {!readonly&&<button onClick={()=>setModalDerrama(true)} style={{...Btn(C.wine),padding:"6px 12px",fontSize:11}}>+ Nueva</button>}
            </div>
            {derramas.length===0?(
              <div style={{textAlign:"center",padding:"40px 20px",color:C.textS}}>
                <div style={{fontSize:32,marginBottom:12}}>+</div>
                <div style={{fontWeight:700,fontSize:14,marginBottom:6}}>Sin derramas registradas</div>
                <div style={{fontSize:12}}>Registra aqui gastos extraordinarios que adelanta un socio</div>
              </div>
            ):derramas.map(d=>{
              const aportantes=d.aportantes||[];
              const totalAsig=aportantes.reduce((s,a)=>s+a.importe,0);
              const af=aportFormDerrama[d.id]||{socioId:"",importe:""};
              const yaAsignados=aportantes.map(a=>a.socioId);
              const disponibles=socios.filter(s=>!yaAsignados.includes(s.id));
              return(
                <div key={d.id} style={{...Cd,borderLeft:`3px solid ${C.amber}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:13}}>{d.concepto}</div>
                      <div style={{fontSize:11,color:C.textS,marginTop:2}}>{ffec(d.fecha)}</div>
                    </div>
                    <div style={{fontWeight:800,fontSize:15,color:C.amber}}>{fmt(d.importe)}</div>
                  </div>
                  {/* Aportantes */}
                  {aportantes.length>0&&(
                    <div style={{marginBottom:8}}>
                      <div style={{fontSize:10,color:C.textS,textTransform:"uppercase",marginBottom:4}}>Adelantado por:</div>
                      {aportantes.map((ap,ai)=>{
                        const aSocio=socios.find(x=>x.id===ap.socioId);
                        return(
                          <div key={ai} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:C.amberL,borderRadius:6,padding:"5px 10px",marginBottom:3}}>
                            <span style={{fontSize:12,fontWeight:700,color:C.amber}}>{aSocio?.nombre}</span>
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                              <span style={{fontWeight:800,color:C.wine,fontSize:13}}>{fmt(ap.importe)}</span>
                              {!readonly&&<button onClick={()=>removeAportanteDerrama(d.id,ap.socioId)} style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:14,padding:"0 2px"}}>x</button>}
                            </div>
                          </div>
                        );
                      })}
                      {aportantes.length>1&&<div style={{fontSize:10,color:C.textS,textAlign:"right",marginTop:2}}>Total asignado: {fmt(totalAsig)} / {fmt(d.importe)}</div>}
                    </div>
                  )}
                  {!readonly&&disponibles.length>0&&(
                    <div style={{background:C.cream,borderRadius:8,padding:"8px 10px",borderTop:`1px solid ${C.border}`}}>
                      <div style={{fontSize:10,color:C.textS,textTransform:"uppercase",marginBottom:6}}>Anadir aportante:</div>
                      {disponibles.length===socios.length&&(
                        <button onClick={()=>{
                          socios.forEach(s=>addAportanteDerrama(d.id,s.id,APORTACION_INI));
                        }} style={{...Btn(C.blue),width:"100%",padding:"8px",fontSize:11,marginBottom:8}}>
                          Todos los socios ({fmt(APORTACION_INI)} c/u = {fmt(socios.length*APORTACION_INI)})
                        </button>
                      )}
                      <div style={{display:"flex",gap:6,alignItems:"center"}}>
                        <select value={af.socioId} onChange={e=>setAportFormDerrama(p=>({...p,[d.id]:{...af,socioId:e.target.value}}))}
                          style={{...Ip,flex:2,fontSize:11,padding:"5px 6px"}}>
                          <option value="">Socio</option>
                          {disponibles.map(s=><option key={s.id} value={s.id}>{s.nombre}</option>)}
                        </select>
                        <input type="number" placeholder="EUR" value={af.importe}
                          onChange={e=>setAportFormDerrama(p=>({...p,[d.id]:{...af,importe:e.target.value}}))}
                          style={{...Ip,flex:1,fontSize:11,padding:"5px 6px"}}/>
                        <button onClick={()=>{addAportanteDerrama(d.id,af.socioId,af.importe);setAportFormDerrama(p=>({...p,[d.id]:{socioId:"",importe:""}}));}}
                          style={{...Btn(C.amber),padding:"6px 10px",fontSize:11,flexShrink:0}}>+</button>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {/* -- BALANCE POR SOCIO ----------------------------------------------- */}
        {tab==="balance"&&(
          <div>
            <div style={{fontWeight:700,fontSize:13,marginBottom:12}}>Balance por socio</div>
            <div style={{...Cd,background:C.amberL,borderColor:C.amber,marginBottom:14}}>
              <div style={{fontSize:12,color:"#7A4A00",lineHeight:1.7}}>
                El saldo positivo representa lo que la sociedad debe a cada socio por sus adelantos.
                Se compensa con los superavits de cenas e incorporacion de nuevos socios.
              </div>
            </div>
            {socios.map(s=>{
              const adelantado=totalAdelantado(s.id);
              const devuelto=totalDevuelto(s.id);
              const pendiente=saldoPendiente(s.id);
              if(adelantado===0) return null; // socio sin adelantos
              const pct=Math.min(devuelto/adelantado*100,100);
              return(
                <div key={s.id} style={{...Cd,borderLeft:`3px solid ${pendiente>0?C.amber:C.green}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                    <div style={{fontWeight:800,fontSize:14}}>{s.nombre}</div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontWeight:900,fontSize:15,color:pendiente>0?C.amber:C.green}}>
                        {pendiente>0?`Se le deben ${fmt(pendiente)}`:"Liquidado"}
                      </div>
                    </div>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:6,color:C.textS}}>
                    <span>Adelantado: <strong style={{color:C.wine}}>{fmt(adelantado)}</strong></span>
                    <span>Devuelto: <strong style={{color:C.green}}>{fmt(devuelto)}</strong></span>
                  </div>
                  <div style={{background:C.border,borderRadius:99,height:8,overflow:"hidden",marginBottom:6}}>
                    <div style={{width:`${pct}%`,height:"100%",background:C.green,borderRadius:99}}/>
                  </div>
                  <div style={{fontSize:10,color:C.textS}}>{Math.round(pct)}% recuperado</div>
                  {/* Detalle de sus adelantos */}
                  {[
                    ...inversiones.filter(i=>(i.aportantes||[]).some(a=>a.socioId===s.id)).map(i=>{
                      const ap=(i.aportantes||[]).find(a=>a.socioId===s.id);
                      return {concepto:i.concepto,importe:ap?.importe||0,tipo:"Inversion"};
                    }),
                    ...derramas.filter(d=>(d.aportantes||[]).some(a=>a.socioId===s.id)||(d.socioId===s.id&&!d.aportantes?.length)).map(d=>{
                      const ap=(d.aportantes||[]).find(a=>a.socioId===s.id);
                      return {concepto:d.concepto,importe:ap?ap.importe:d.importe,tipo:"Derrama"};
                    })
                  ].map((item,i)=>(
                    <div key={i} style={{marginTop:4,fontSize:11,color:C.textS,paddingTop:4,borderTop:`1px solid ${C.border}`}}>
                      <span style={{background:item.tipo==="Inversion"?C.blueL:C.amberL,borderRadius:4,padding:"1px 6px",fontSize:9,fontWeight:700,color:item.tipo==="Inversion"?C.blue:C.amber,marginRight:6}}>{item.tipo}</span>
                      {item.concepto} - {fmt(item.importe)}
                    </div>
                  ))}
                </div>
              );
            })}
            {socios.every(s=>totalAdelantado(s.id)===0)&&(
              <div style={{textAlign:"center",padding:"40px 20px",color:C.textS}}>
                <div style={{fontSize:14}}>Asigna socios a las inversiones para ver el balance</div>
              </div>
            )}
          </div>
        )}

        {/* -- DEVOLUCIONES ---------------------------------------------------- */}
        {tab==="devoluciones"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{fontWeight:700,fontSize:13}}>Devoluciones - {fmt(totalDevueltoGlobal)}</div>
              {!readonly&&<button onClick={()=>setModalDev(true)} style={{...Btn(C.green),padding:"6px 12px",fontSize:11}}>+ Registrar</button>}
            </div>
            {devoluciones.length===0?(
              <div style={{textAlign:"center",padding:"40px 20px",color:C.textS}}>
                <div style={{fontSize:14,fontWeight:700,marginBottom:6}}>Sin devoluciones registradas</div>
                <div style={{fontSize:12}}>Registra aqui los pagos realizados a los socios que adelantaron dinero</div>
              </div>
            ):([...devoluciones].sort((a,b)=>b.fecha.localeCompare(a.fecha)).map(d=>{
              const s=socios.find(x=>x.id===d.socioId);
              return(
                <div key={d.id} style={{...Cd,borderLeft:`3px solid ${C.green}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:13}}>A {s?.nombre}</div>
                      <div style={{fontSize:11,color:C.textS,marginTop:2}}>{ffec(d.fecha)} . {d.concepto}</div>
                    </div>
                    <div style={{display:"flex",gap:8,alignItems:"center"}}>
                      <div style={{fontWeight:800,fontSize:15,color:C.green}}>{fmt(d.importe)}</div>
                      {!readonly&&<button onClick={()=>eliminarDevolucion(d.id)} style={{background:"none",border:`1px solid ${C.red}`,color:C.red,borderRadius:6,padding:"3px 8px",cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>x</button>}
                    </div>
                  </div>
                  <div style={{fontSize:10,color:C.textS,marginTop:4,background:C.cream,borderRadius:6,padding:"4px 8px",display:"inline-block"}}>{d.origen}</div>
                </div>
              );
            }))}
          </div>
        )}
      </div>

      {/* -- MODAL NUEVA INVERSION --------------------------------------------- */}
      {modalInv&&(
        <div style={{position:"fixed",inset:0,background:"rgba(44,24,16,0.6)",display:"flex",alignItems:"flex-end",zIndex:50}}>
          <div style={{background:C.surface,borderRadius:"20px 20px 0 0",padding:24,width:"100%",boxSizing:"border-box",maxHeight:"90vh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:18}}>
              <span style={{fontFamily:"Georgia,serif",fontSize:18,fontWeight:800,color:C.wine}}>Nueva Inversion</span>
              <button onClick={()=>setModalInv(false)} style={{background:"none",border:"none",fontSize:20,color:C.textS,cursor:"pointer"}}>x</button>
            </div>
            <label style={Lb}>Concepto *</label>
            <input style={{...Ip,marginBottom:12}} value={formInv.concepto} onChange={e=>setFormInv(p=>({...p,concepto:e.target.value}))} placeholder="Ej: Nevera nueva, mesa..."/>
            <div style={{display:"flex",gap:12,marginBottom:12}}>
              <div style={{flex:1}}><label style={Lb}>Importe (EUR) *</label><input style={Ip} type="number" value={formInv.importe} onChange={e=>setFormInv(p=>({...p,importe:e.target.value}))} placeholder="0"/></div>
              <div style={{flex:1}}><label style={Lb}>Categoria</label>
                <select style={Ip} value={formInv.categoria} onChange={e=>setFormInv(p=>({...p,categoria:e.target.value}))}>
                  {CATEGORIAS.map(c=><option key={c}>{c}</option>)}
                </select>
              </div>
            </div>
            <div style={{fontSize:11,color:C.textS,padding:"8px 12px",background:C.amberL,borderRadius:8,marginBottom:18}}>Podras asignar los socios que adelantan desde la lista de inversiones.</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setModalInv(false)} style={{...Btn(C.surface,C.wine),flex:1,border:`1.5px solid ${C.wine}`}}>Cancelar</button>
              <button onClick={guardarInversion} style={{...Btn(C.wine),flex:2,padding:"12px"}}>Guardar</button>
            </div>
          </div>
        </div>
      )}

      {/* -- MODAL NUEVA DERRAMA ----------------------------------------------- */}
      {modalDerrama&&(
        <div style={{position:"fixed",inset:0,background:"rgba(44,24,16,0.6)",display:"flex",alignItems:"flex-end",zIndex:50}}>
          <div style={{background:C.surface,borderRadius:"20px 20px 0 0",padding:24,width:"100%",boxSizing:"border-box"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:18}}>
              <span style={{fontFamily:"Georgia,serif",fontSize:18,fontWeight:800,color:C.wine}}>Nueva Derrama</span>
              <button onClick={()=>setModalDerrama(false)} style={{background:"none",border:"none",fontSize:20,color:C.textS,cursor:"pointer"}}>x</button>
            </div>
            <label style={Lb}>Concepto *</label>
            <input style={{...Ip,marginBottom:12}} value={formDerrama.concepto} onChange={e=>setFormDerrama(p=>({...p,concepto:e.target.value}))} placeholder="Ej: Reparacion calefaccion..."/>
            <div style={{display:"flex",gap:12,marginBottom:12}}>
              <div style={{flex:1}}><label style={Lb}>Importe (EUR) *</label><input style={Ip} type="number" value={formDerrama.importe} onChange={e=>setFormDerrama(p=>({...p,importe:e.target.value}))} placeholder="0"/></div>
              <div style={{flex:1}}><label style={Lb}>Fecha</label><input style={Ip} type="date" value={formDerrama.fecha} onChange={e=>setFormDerrama(p=>({...p,fecha:e.target.value}))}/></div>
            </div>
            <div style={{fontSize:11,color:C.textS,padding:"8px 12px",background:C.amberL,borderRadius:8,marginBottom:20}}>Podras asignar los socios que adelantan desde la lista de derramas.</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setModalDerrama(false)} style={{...Btn(C.surface,C.wine),flex:1,border:`1.5px solid ${C.wine}`}}>Cancelar</button>
              <button onClick={guardarDerrama} style={{...Btn(C.amber),flex:2,padding:"12px"}}>Guardar</button>
            </div>
          </div>
        </div>
      )}

      {/* -- MODAL NUEVA DEVOLUCION -------------------------------------------- */}
      {modalDev&&(
        <div style={{position:"fixed",inset:0,background:"rgba(44,24,16,0.6)",display:"flex",alignItems:"flex-end",zIndex:50}}>
          <div style={{background:C.surface,borderRadius:"20px 20px 0 0",padding:24,width:"100%",boxSizing:"border-box"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:18}}>
              <span style={{fontFamily:"Georgia,serif",fontSize:18,fontWeight:800,color:C.wine}}>Registrar Devolucion</span>
              <button onClick={()=>setModalDev(false)} style={{background:"none",border:"none",fontSize:20,color:C.textS,cursor:"pointer"}}>x</button>
            </div>
            <label style={Lb}>Pagar a *</label>
            <select style={{...Ip,marginBottom:12}} value={formDev.socioId} onChange={e=>setFormDev(p=>({...p,socioId:e.target.value}))}>
              <option value="">Selecciona socio</option>
              {socios.filter(s=>saldoPendiente(s.id)>0).map(s=>(
                <option key={s.id} value={s.id}>{s.nombre} (pendiente: {fmt(saldoPendiente(s.id))})</option>
              ))}
            </select>
            <div style={{display:"flex",gap:12,marginBottom:12}}>
              <div style={{flex:1}}><label style={Lb}>Importe (EUR) *</label><input style={Ip} type="number" value={formDev.importe} onChange={e=>setFormDev(p=>({...p,importe:e.target.value}))} placeholder="0"/></div>
              <div style={{flex:1}}><label style={Lb}>Fecha</label><input style={Ip} type="date" value={formDev.fecha} onChange={e=>setFormDev(p=>({...p,fecha:e.target.value}))}/></div>
            </div>
            <label style={Lb}>Origen de los fondos</label>
            <select style={{...Ip,marginBottom:12}} value={formDev.origen} onChange={e=>setFormDev(p=>({...p,origen:e.target.value}))}>
              {ORIGENES.map(o=><option key={o}>{o}</option>)}
            </select>
            <label style={Lb}>Notas adicionales</label>
            <input style={{...Ip,marginBottom:20}} value={formDev.concepto} onChange={e=>setFormDev(p=>({...p,concepto:e.target.value}))} placeholder="Descripcion opcional..."/>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setModalDev(false)} style={{...Btn(C.surface,C.wine),flex:1,border:`1.5px solid ${C.wine}`}}>Cancelar</button>
              <button onClick={guardarDevolucion} style={{...Btn(C.green),flex:2,padding:"12px"}}>Confirmar devolucion</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const ICON_URL = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='80' fill='%235C1520'/%3E%3Crect x='20' y='20' width='472' height='472' rx='65' fill='%237A1E2E'/%3E%3Ctext x='256' y='265' font-family='Georgia,serif' font-size='175' font-weight='bold' fill='%23C4893A' text-anchor='middle' dominant-baseline='middle'%3ETxoko%3C/text%3E%3Ctext x='256' y='390' font-family='Arial,sans-serif' font-size='62' font-weight='700' fill='%23C4893A' text-anchor='middle' letter-spacing='6'%3ESAN PEDRO%3C/text%3E%3C/svg%3E";
function AppleIcon(){
  React.useEffect(()=>{
    // Apple touch icon
    let link = document.querySelector("link[rel~='apple-touch-icon']");
    if(!link){ link=document.createElement("link"); link.rel="apple-touch-icon"; document.head.appendChild(link); }
    link.href = ICON_URL;
    // Favicon
    let fav = document.querySelector("link[rel='icon']");
    if(!fav){ fav=document.createElement("link"); fav.rel="icon"; fav.type="image/svg+xml"; document.head.appendChild(fav); }
    fav.href = ICON_URL;
    // Theme color
    let meta = document.querySelector("meta[name='theme-color']");
    if(!meta){ meta=document.createElement("meta"); meta.name="theme-color"; document.head.appendChild(meta); }
    meta.content = "#5C1520";
    // Title
    document.title = "Txoko San Pedro";
  },[]);
  return null;
}


function App(){
  // -- HOOKS (todos antes del return condicional) --
  const [acceso,setAcceso] = useState(false);
  const [rol,setRol]       = useState("");

  // Auto-save to Firebase whenever data changes
  useEffect(()=>{
    if(!acceso || rol!=="admin") return; // Only save when admin is logged in
    if(typeof window.fbSave !== "function") return;
    const timer = setTimeout(()=>{
      window.fbSave({cenas, cuotas, teso, facturas, socios, inversiones, derramas, devoluciones});
    }, 1500); // Debounce 1.5s
    return ()=>clearTimeout(timer);
  },[cenas, cuotas, teso, facturas, socios, inversiones, derramas, devoluciones, acceso]);
  const [pag,setPag]       = useState("dashboard");
  const [socios,setSocios]           = useState(fd.socios       || SOCIOS_INIT);
  const [inversiones,setInversiones]  = useState(fd.inversiones  || INVERSIONES_INIT);
  const [derramas,setDerramas]        = useState(fd.derramas     || DERRAMAS_INIT);
  const [devoluciones,setDevoluciones]= useState(fd.devoluciones || DEVOLUCIONES_INIT);
  const [selCena,setSelCena] = useState(null);
  const fd = firebaseInitData || {};
  const [cenas,setCenas]           = useState(fd.cenas      || CENAS_INIT);
  const [cuotas,setCuotas]         = useState(fd.cuotas     || CUOTAS_INIT);
  const [teso,setTeso]             = useState(fd.teso       || {caja:450,banco:2800,bizum:320});
  const [facturas,setFacturas]     = useState(fd.facturas   || [
    {id:1,concepto:"Cocinero junio",  importe:300,cat:"Cocinero",venc:"2025-06-14",pagado:false},
    {id:2,concepto:"Limpieza junio",  importe:50, cat:"Limpieza",venc:"2025-06-14",pagado:false},
    {id:3,concepto:"Alquiler junio",  importe:110,cat:"Alquiler",venc:"2025-06-01",pagado:true},
  ]);

  const addCena = useCallback(({nombre,fecha})=>{
    setCenas(p=>[...p,{
      id:Date.now(), nombre, fecha, cerrada:false,
      asistencia:socios.map(s=>({socioId:s.id,estado:"pendiente",invitados:[]})),
      adelantos:[
        {id:1001,socioId:1,concepto:"",importe:0,cat:"comida"},
        {id:1002,socioId:9,concepto:"",importe:0,cat:"bebida"},
        {id:1003,socioId:8,concepto:"",importe:0,cat:"menaje"},
      ],
      costes:{...CF_DEFAULT},
    }]);
    setPag("cena_lista");
  },[]);

  // Tabs bottom nav
  const NAV = [
    {id:"dashboard",   label:"Inicio"},
    {id:"cena_lista",  label:"Cenas"},
    {id:"socios",      label:"Socios"},
    {id:"inversiones", label:"Inversiones"},
    {id:"tesoreria",   label:"Tesoreria"},
    {id:"informes",    label:"Informes"},
  ];

  const pendTotal = useMemo(()=>{
    let n=0;
    cenas.forEach(c=>c.asistencia?.forEach(a=>{
      if(a.estado==="pendiente") n++;
      n+=(a.invitados||[]).filter(i=>!i.pagado&&!i.cargoSocio).length;
    }));
    const mesAct="2025-05";
    socios.forEach(s=>{ if(!cuotas.find(p=>p.socioId===s.id&&p.periodo===mesAct)) n++; });
    return n;
  },[cenas,cuotas]);

  // Pantalla activa (fuera del if para no violar hooks)
  const renderPantalla = ()=>{
    if(!acceso) return <Login onAcceso={(r)=>{setAcceso(true);setRol(r);}}/>;
    switch(pag){
      case "dashboard":   return <Dashboard cenas={cenas} socios={socios} cuotas={cuotas} teso={teso} facturas={facturas} setPag={setPag} setSelCena={setSelCena} readonly={ro}/>;
      case "cena_lista":  return <CenaLista cenas={cenas} addCena={ro?null:addCena} selCena={selCena} setSelCena={setSelCena} setPag={setPag} readonly={ro}/>;
      case "cena_detalle":return <CenaDetalle cenaId={selCena} cenas={cenas} setCenas={ro?null:setCenas} socios={socios} teso={teso} setTeso={ro?null:setTeso} setPag={setPag} readonly={ro}/>;
      case "socios":      return <Socios socios={socios} setSocios={setSocios} cenas={cenas} cuotas={cuotas} readonly={rol==="socio"}/>;
      case "pagos":       return <PagosPendientes cenas={cenas} setCenas={ro?null:setCenas} socios={socios} cuotas={cuotas} setCuotas={ro?null:setCuotas} teso={teso} setTeso={ro?null:setTeso} readonly={ro}/>;
      case "tesoreria":   return <Tesoreria teso={teso} setTeso={ro?null:setTeso} cenas={cenas} socios={socios} cuotas={cuotas} facturas={facturas} setFacturas={ro?null:setFacturas} readonly={ro}/>;
      case "inversiones": return <Inversiones socios={socios} cenas={cenas} inversiones={inversiones} setInversiones={rol==="socio"?(()=>{}):setInversiones} derramas={derramas} setDerramas={rol==="socio"?(()=>{}):setDerramas} devoluciones={devoluciones} setDevoluciones={rol==="socio"?(()=>{}):setDevoluciones} readonly={rol==="socio"}/>;
      case "informes":    return <Informes cenas={cenas} cuotas={cuotas} socios={socios} teso={teso} facturas={facturas} readonly={ro}/>;
      default:            return null;
    }
  };

  // -- MARCO MOVIL ------------------------------------------------------------
  // -- LAYOUT LIMPIO ---------------------------------------------------------
  const ro = rol === "socio";

  return(
    <div style={{
      display:"flex", flexDirection:"column",
      height:"100vh", maxWidth:430,
      margin:"0 auto", background:C.bg,
      fontFamily:"-apple-system,'Segoe UI',system-ui,sans-serif",
      overflow:"hidden",
    }}>
      <style>{`
        * { box-sizing: border-box; }
        html, body { background: #5C1520; }
        ::-webkit-scrollbar { display: none; }
        input:focus, select:focus { outline: 2px solid #7A1E2E; }
        button:active { opacity: 0.85; }
        @media print { .noprint { display:none!important; } * { -webkit-print-color-adjust:exact!important; print-color-adjust:exact!important; } }
      `}</style>
      <AppleIcon/>

      {/* Banda de modo */}
      {acceso&&ro&&<div style={{background:C.blue,padding:"4px 14px",display:"flex",justifyContent:"space-between",flexShrink:0}}><span style={{fontSize:11,color:"#fff",fontWeight:700}}>Modo consulta</span><span style={{fontSize:10,color:"rgba(255,255,255,0.7)"}}>Solo lectura</span></div>}
      {acceso&&!ro&&<div style={{background:C.wine,padding:"4px 14px",display:"flex",justifyContent:"space-between",flexShrink:0}}><span style={{fontSize:11,color:"rgba(255,255,255,0.8)",fontWeight:600}}>Modo edicion</span><span style={{fontSize:10,color:"rgba(255,255,255,0.5)"}}>Tesorero</span></div>}

      {/* Contenido scrollable */}
      <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
        {renderPantalla()}
      </div>

      {/* NAV FIJA EN EL FLUJO - siempre visible */}
      {acceso&&pag!=="cena_detalle"&&(
        <div style={{flexShrink:0,display:"flex",background:C.surface,borderTop:`2px solid ${C.border}`,boxShadow:"0 -2px 10px rgba(44,24,16,0.12)"}}>
          {NAV.map(({id,label})=>{
            const active=pag===id;
            const badge=(id==="pagos"&&pendTotal>0)?pendTotal:0;
            return(
              <button key={id} onClick={()=>setPag(id)} style={{
                flex:1,border:"none",borderRight:`1px solid ${C.border}`,
                background:active?C.wine:"#fff",cursor:"pointer",
                padding:"14px 2px 12px",display:"flex",flexDirection:"column",
                alignItems:"center",gap:3,fontFamily:"inherit",position:"relative",minHeight:52,
              }}>
                <span style={{fontSize:12,fontWeight:active?900:600,color:active?"#fff":C.textS,lineHeight:1.3,textAlign:"center"}}>{label}</span>
                {badge>0&&<span style={{position:"absolute",top:5,right:3,background:C.red,color:"#fff",borderRadius:10,padding:"1px 5px",fontSize:9,fontWeight:800}}>{badge}</span>}
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}


// Firebase sync wrapper around App
function AppWithFirebase() {
  const [fbLoaded, setFbLoaded] = useState(false);
  const [fbInitData, setFbInitData] = useState(null);

  useEffect(() => {
    // Timeout de 6 segundos - si Firebase no responde, carga igual
    const timeout = setTimeout(() => {
      console.log("Firebase timeout - cargando sin datos de nube");
      setFbInitData(null);
      setFbLoaded(true);
    }, 6000);

    const check = () => {
      if (window.fbReady) {
        clearTimeout(timeout);
        setFbInitData(window.fbData);
        setFbLoaded(true);
      } else {
        setTimeout(check, 300);
      }
    };
    check();

    // Actualizar datos en tiempo real
    window.onFbData = (data) => {
      if (!fbLoaded) return;
      // datos actualizados en tiempo real
    };

    return () => clearTimeout(timeout);
  }, []);

  if (!fbLoaded) {
    return (
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#5C1520",color:"#C4893A",fontFamily:"Georgia,serif",fontSize:"22px",fontWeight:"900",textAlign:"center",padding:"20px",flexDirection:"column"}}>
        <div>Txoko San Pedro</div>
        <div style={{fontSize:"13px",color:"rgba(255,255,255,0.5)",fontFamily:"Arial",fontWeight:"400",marginTop:"8px"}}>Conectando...</div>
        <div style={{fontSize:"11px",color:"rgba(255,255,255,0.3)",fontFamily:"Arial",fontWeight:"400",marginTop:"16px"}}>Si tarda, comprueba tu conexion a internet</div>
      </div>
    );
  }

  return <App firebaseInitData={fbInitData} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(AppWithFirebase));
  </script>
