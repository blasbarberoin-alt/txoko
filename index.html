  }))

// -- HELPERS -------------------------------------------------------------------
const fmt = n => new Intl.NumberFormat("es-ES",{style:"currency",currency:"EUR"}).format(n||0);
const ffec = iso => { try{const[y,m,d]=iso.split("-");return`${d}/${m}/${y}`;}catch{return iso;}};

const calcCena = c => {
  const P = PRECIO_COMENSAL;
  let ingConf=0, ingPend=0, nCom=0;
  (c.asistencia||[]).forEach(a=>{
    const asiste = a.estado==="paga"||a.estado==="pendiente";
    if(!asiste) return;
    nCom++;
    if(a.estado==="paga") ingConf+=P; else ingPend+=P;
    (a.invitados||[]).forEach(i=>{
      nCom++;
      if(i.cargoSocio||i.pagado) ingConf+=P; else ingPend+=P;
    });
  });
  const totalAdel = (c.adelantos||[]).filter(a=>a.importe>0).reduce((s,a)=>s+a.importe,0);
  const cf = c.costes||CF_DEFAULT;
  const totalCF = (cf.cocinero||0)+(cf.limpieza||0)+(cf.alquiler||0);
  const potencial = nCom*P;
  const resultado = potencial - totalAdel - totalCF;
  return {ingConf,ingPend,nCom,totalAdel,totalCF,potencial,resultado};
};

// -- LOGIN ---------------------------------------------------------------------
function Login({onAcceso}){
  const [pw,setPw]=useState("");
  const [err,setErr]=useState(false);
  const [modo,setModo]=useState("admin");
  const intentar=()=>{
    if(modo==="admin"&&pw===PASSWORD_ADMIN){onAcceso("admin");return;}
    if(modo==="socio"&&pw===PASSWORD_SOCIO){onAcceso("socio");return;}
    setErr(true);setPw("");
  };
  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:`linear-gradient(160deg,${C.wineD} 0%,${C.wine} 60%,#9B3A4A 100%)`,padding:24,minHeight:"80vh"}}>

      <div style={{fontSize:11,color:"rgba(255,255,255,0.4)",marginBottom:24,letterSpacing:1,textTransform:"uppercase"}}>Sistema de gestion</div>
      <div style={{background:"#fff",borderRadius:18,padding:22,width:"100%",maxWidth:340,boxShadow:"0 8px 40px rgba(0,0,0,0.35)"}}>

            <button key={m} onClick={()=>{setModo(m);setPw("");setErr(false);}}
              style={{flex:1,border:`2px solid ${modo===m?col:C.border}`,background:modo===m?col:"#fff",color:modo===m?"#fff":C.textS,borderRadius:9,padding:"9px 4px",cursor:"pointer",fontWeight:700,fontSize:11,fontFamily:"inherit",lineHeight:1.3}}>
              {l}
            </button>
          ))}
        </div>
        <div style={{padding:"8px 12px",background:modo==="admin"?C.wine+"12":C.blue+"12",borderRadius:8,fontSize:11,color:modo==="admin"?C.wine:C.blue,marginBottom:16}}>
          {modo==="admin"?"Acceso completo: editar y gestionar todos los datos":"Acceso consulta: ver sin modificar nada"}
        </div>
        <div style={{fontSize:11,fontWeight:700,color:C.textS,textTransform:"uppercase",marginBottom:6}}>Contrasena</div>
        <input
          style={{...Ip,textAlign:"center",fontSize:20,letterSpacing:6,marginBottom:err?8:14,borderColor:err?C.red:C.border}}
          type="password" placeholder="------" value={pw}
          onChange={e=>{setPw(e.target.value);setErr(false);}}
          onKeyDown={e=>{if(e.key==="Enter")intentar();}}
        />
        {err&&<div style={{color:C.red,fontSize:12,fontWeight:700,textAlign:"center",marginBottom:10}}>Contrasena incorrecta</div>}
        <button style={{...Btn(modo==="admin"?C.wine:C.blue),width:"100%",padding:"13px",fontSize:15,borderRadius:12}} onClick={intentar}>
          Entrar
        </button>
      </div>
    </div>
  );
}

function Dashboard({cenas,socios,cuotas,teso,facturas,setPag,setSelCena}){
  const totalDisp = teso.caja+teso.banco+teso.bizum;
  const proxCena  = [...cenas].filter(c=>!c.cerrada).sort((a,b)=>a.fecha.localeCompare(b.fecha))[0];
  const pendPagar = facturas.filter(f=>!f.pagado).reduce((s,f)=>s+f.importe,0);
  const pendCobrar= cenas.reduce((s,c)=>s+calcCena(c).ingPend,0);
  const saldoFut  = totalDisp+pendCobrar-pendPagar;
  const totalRes  = cenas.reduce((s,c)=>s+calcCena(c).resultado,0);
  const nPendPagos= cenas.reduce((s,c)=>{
    let n=0;
    c.asistencia?.forEach(a=>{
      if(a.estado==="pendiente") n++;
      n+=(a.invitados||[]).filter(i=>!i.pagado&&!i.cargoSocio).length;
    });
    return s+n;
  },0);

  // Alertas inteligentes
  const alertas=[];
  if(nPendPagos>0)   alertas.push({txt:`${nPendPagos} pagos pendientes de cobrar`,color:C.red,pag:"pagos"});
  if(pendPagar>0)    alertas.push({txt:`${fmt(pendPagar)} en facturas por pagar`,color:C.amber,pag:"tesoreria"});
  if(saldoFut<0)     alertas.push({txt:"Saldo futuro negativo - revisa gastos",color:C.red,pag:"tesoreria"});

  // Mini barra dinero
  const maxTeso=Math.max(totalDisp,1);
  const cajaPct=teso.caja/maxTeso*100;
  const bancoPct=teso.banco/maxTeso*100;
  const bizumPct=teso.bizum/maxTeso*100;

  // Ultimas cenas
  const ultCenas=[...cenas].sort((a,b)=>b.fecha.localeCompare(a.fecha)).slice(0,3);

  return(
    <div style={{paddingBottom:16}}>
      {/* Hero */}
      <div style={{background:`linear-gradient(150deg,${C.wineD} 0%,${C.wine} 70%)`,padding:"20px 16px 20px",position:"relative",overflow:"hidden"}}>
        {/* Decoraci-n */}
        <div style={{position:"absolute",top:-40,right:-40,width:140,height:140,borderRadius:"50%",background:"rgba(255,255,255,0.04)"}}/>
        <div style={{position:"absolute",bottom:-20,right:20,width:80,height:80,borderRadius:"50%",background:"rgba(255,255,255,0.06)"}}/>
        <div style={{fontSize:10,color:"rgba(255,255,255,0.45)",textTransform:"uppercase",letterSpacing:1.5,marginBottom:8}}>Dinero disponible</div>
        <div style={{fontSize:40,fontWeight:900,color:"#fff",lineHeight:1}}>{fmt(totalDisp)}</div>
        <div style={{fontSize:11,color:"rgba(255,255,255,0.5)",marginTop:6,marginBottom:14}}>Caja + Banco + Bizum</div>
        {/* Mini barras por cuenta */}
        <div style={{display:"flex",gap:4,marginBottom:8}}>
          {[["Caja",cajaPct,C.goldL],["Banco",bancoPct,"rgba(255,255,255,0.8)"],["Bizum",bizumPct,C.greenL]].map(([l,p,col])=>(
            <div key={l} style={{flex:1}}>
              <div style={{height:4,background:"rgba(255,255,255,0.15)",borderRadius:99,overflow:"hidden"}}>
                <div style={{width:`${Math.min(p,100)}%`,height:"100%",background:col,borderRadius:99}}/>
              </div>
              <div style={{fontSize:9,color:"rgba(255,255,255,0.4)",marginTop:3}}>{l}: {fmt(teso[l.toLowerCase()])}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{padding:"12px 12px 0"}}>
        {/* KPIs fila */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
          <div style={{...Cd,marginBottom:0,borderLeft:`3px solid ${saldoFut>=0?C.green:C.red}`}}>
            <div style={{fontSize:10,color:C.textS,textTransform:"uppercase",marginBottom:4}}>Saldo real futuro</div>
            <div style={{fontSize:20,fontWeight:900,color:saldoFut>=0?C.green:C.red}}>{fmt(saldoFut)}</div>
            <div style={{fontSize:10,color:C.textS,marginTop:2}}>disponible + cobrar - pagar</div>
          </div>
          <div style={{...Cd,marginBottom:0,borderLeft:`3px solid ${totalRes>=0?C.green:C.red}`}}>
            <div style={{fontSize:10,color:C.textS,textTransform:"uppercase",marginBottom:4}}>Resultado cenas</div>
            <div style={{fontSize:20,fontWeight:900,color:totalRes>=0?C.green:C.red}}>{fmt(totalRes)}</div>
            <div style={{fontSize:10,color:C.textS,marginTop:2}}>{cenas.length} cenas acumulado</div>
          </div>
        </div>

        {/* Alertas */}
        {alertas.length>0&&(
          <div style={{marginBottom:14}}>
            <div style={{fontSize:10,fontWeight:700,color:C.textS,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Alertas</div>
            {alertas.map((a,i)=>(
              <div key={i} onClick={()=>setPag(a.pag)} style={{background:a.color+"12",borderLeft:`3px solid ${a.color}`,borderRadius:8,padding:"10px 12px",marginBottom:6,fontSize:12,color:a.color,fontWeight:600,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span>{a.txt}</span>
                <span style={{opacity:0.6}}>></span>
              </div>
            ))}
          </div>
        )}

        {/* Proxima cena */}
        {proxCena&&(()=>{
          const r=calcCena(proxCena);
          const nAsist=proxCena.asistencia?.filter(a=>a.estado!=="no_asiste").length||0;
          return(
            <div style={{marginBottom:14}}>
              <div style={{fontSize:10,fontWeight:700,color:C.textS,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Proxima cena</div>
              <div onClick={()=>{setSelCena(proxCena.id);setPag("cena_detalle");}} style={{...Cd,cursor:"pointer",background:`linear-gradient(135deg,${C.wine}08,${C.wine}14)`,borderColor:C.wine+"40"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                  <div>
                    <div style={{fontFamily:"Georgia,serif",fontWeight:800,fontSize:16,color:C.wine}}>{proxCena.nombre}</div>
                    <div style={{fontSize:11,color:C.textS,marginTop:3}}>{ffec(proxCena.fecha)}</div>
                  </div>
                  <span style={{background:C.wine,color:"#fff",borderRadius:20,padding:"3px 10px",fontSize:10,fontWeight:700}}>Abierta</span>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                  {[["Confirmados",nAsist+" socios",C.wine],["Cobrado",fmt(r.ingConf),C.green],["Pendiente",fmt(r.ingPend),r.ingPend>0?C.red:C.textS]].map(([l,v,col])=>(
                    <div key={l} style={{background:"rgba(255,255,255,0.7)",borderRadius:8,padding:"8px 6px",textAlign:"center"}}>
                      <div style={{fontSize:9,color:C.textS,textTransform:"uppercase",marginBottom:3}}>{l}</div>
                      <div style={{fontSize:13,fontWeight:800,color:col}}>{v}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          );
        })()}

        {/* Acciones rapidas */}
        <div style={{fontSize:10,fontWeight:700,color:C.textS,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Acceso rapido</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
          {[
            {label:"+ Nueva cena",      pag:"cena_lista",  col:C.wine,  bg:C.wine+"15"},
            {label:"Pagos pendientes",  pag:"pagos",       col:C.red,   bg:C.red+"10",badge:nPendPagos},
            {label:"Tesoreria",         pag:"tesoreria",   col:C.blue,  bg:C.blue+"10"},
            {label:"Informes",          pag:"informes",    col:C.green, bg:C.green+"10"},
          ].map(({label,pag,col,bg,badge})=>(
            <button key={pag} onClick={()=>setPag(pag)} style={{...Cd,marginBottom:0,cursor:"pointer",background:bg,borderColor:col+"30",color:col,fontWeight:700,fontSize:12,padding:"13px 10px",border:`1px solid ${col}30`,display:"flex",alignItems:"center",justifyContent:"space-between",position:"relative"}}>
              <span>{label}</span>
              {badge>0&&<span style={{background:col,color:"#fff",borderRadius:10,padding:"1px 7px",fontSize:10,fontWeight:800}}>{badge}</span>}
            </button>
          ))}
        </div>

        {/* Actividad reciente */}
        {ultCenas.length>0&&(
          <>
            <div style={{fontSize:10,fontWeight:700,color:C.textS,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Actividad reciente</div>
            {ultCenas.map(c=>{
              const r=calcCena(c);
              return(
                <div key={c.id} onClick={()=>{setSelCena(c.id);setPag("cena_detalle");}} style={{...Cd,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:13,color:C.wine}}>{c.nombre}</div>
                    <div style={{fontSize:11,color:C.textS,marginTop:2}}>{ffec(c.fecha)} . {r.nCom} com. . {c.cerrada?"Cerrada":"Abierta"}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontWeight:800,fontSize:14,color:r.resultado>=0?C.green:C.red}}>{fmt(r.resultado)}</div>
                    <div style={{fontSize:9,color:C.textS}}>{r.resultado>=0?"superavit":"deficit"}</div>
                  </div>
                </div>
              );
            })}
          </>
        )}

        {/* Barra cuotas */}
        <div style={{fontSize:10,fontWeight:700,color:C.textS,textTransform:"uppercase",letterSpacing:1,marginBottom:8,marginTop:4}}>Cuotas del mes</div>
        <div style={{...Cd}}>
          {(()=>{
            const mes="2025-05";
            const pagados=socios.filter(s=>cuotas.find(p=>p.socioId===s.id&&p.periodo===mes)).length;
            const pct=Math.round(pagados/socios.length*100);
            return(
              <>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:8,fontSize:13}}>
                  <span style={{fontWeight:700}}>{pagados} de {socios.length} socios pagados</span>
                  <span style={{fontWeight:800,color:pct===100?C.green:C.amber}}>{pct}%</span>
                </div>
                <div style={{background:C.border,borderRadius:99,height:8,overflow:"hidden",marginBottom:6}}>
                  <div style={{width:`${pct}%`,height:"100%",background:pct===100?C.green:C.amber,borderRadius:99,transition:"width 0.5s"}}/>
                </div>
                <div style={{fontSize:11,color:C.textS}}>{fmt(pagados*CUOTA_MENSUAL)} cobrados . {fmt((socios.length-pagados)*CUOTA_MENSUAL)} pendientes</div>
              </>
            );
          })()}
        </div>
      </div>
    </div>
  );
}

// -- LISTA CENAS ----------------------------------------------------------------
function CenaLista({cenas,addCena,selCena,setSelCena,setPag,readonly}){
  const [modal,setModal]=useState(false);
  const [vistaAcum,setVistaAcum]=useState(false);
  const [fNombre,setFNombre]=useState("");
  const [fFecha,setFFecha]=useState("");

  const cenasOrd=[...cenas].sort((a,b)=>b.fecha.localeCompare(a.fecha));
  const totalAcum=cenas.reduce((s,c)=>s+calcCena(c).resultado,0);

  const handleCrear=()=>{
    if(!fNombre||!fFecha)return;
    addCena({nombre:fNombre,fecha:fFecha});
    setModal(false);setFNombre("");setFFecha("");
  };

  return(
    <div style={{padding:"0 0 20px"}}>
      {/* Header */}
      <div style={{background:C.wineD,padding:"14px 14px 12px",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div>
          <div style={{fontFamily:"Georgia,serif",fontSize:18,fontWeight:900,color:"#fff"}}>Contab. Cenas</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.5)",marginTop:3}}>{cenas.length} cenas . acum. <span style={{color:totalAcum>=0?C.goldL:C.red,fontWeight:700}}>{fmt(totalAcum)}</span></div>
        </div>
        <button onClick={()=>setVistaAcum(v=>!v)} style={{...Btn("rgba(255,255,255,0.15)"),fontSize:11,padding:"6px 12px"}}>
          {vistaAcum?"Por cena":"Acumulado"}
        </button>
      </div>

      <div style={{padding:"12px 12px 0"}}>
        {!vistaAcum?(
          <>
            {cenasOrd.map(c=>{
              const r=calcCena(c);
              return(
                <div key={c.id} onClick={()=>{setSelCena(c.id);setPag("cena_detalle");}} style={{...Cd,cursor:"pointer",borderLeft:`4px solid ${r.resultado>=0?C.green:C.red}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                    <div>
                      <div style={{fontFamily:"Georgia,serif",fontWeight:800,fontSize:15,color:C.wine}}>{c.nombre}</div>
                      <div style={{fontSize:11,color:C.textS,marginTop:3}}>{ffec(c.fecha)} . {r.nCom} comensales</div>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                      <SemaforoTag estado={c.cerrada?"Cerrada":"Abierta"}/>
                      <SemaforoTag estado={r.resultado>=0?"Superavit":"Deficit"}/>
                    </div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6}}>
                    {[["Comensales",r.nCom,C.textS],["Cobrado",fmt(r.ingConf),C.green],["Pendiente",fmt(r.ingPend),r.ingPend>0?C.red:C.textS],["Resultado",fmt(Math.abs(r.resultado)),r.resultado>=0?C.green:C.red]].map(([l,v,col])=>(
                      <div key={l} style={{background:C.cream,borderRadius:7,padding:"7px 6px",textAlign:"center"}}>
                        <div style={{fontSize:9,color:C.textS,textTransform:"uppercase",marginBottom:2}}>{l}</div>
                        <div style={{fontSize:12,fontWeight:800,color:col}}>{v}</div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
            {/* FAB */}
            <button onClick={()=>setModal(true)} style={{...Btn(C.wine),width:"100%",padding:"14px",fontSize:14,borderRadius:12,marginTop:4,boxShadow:`0 4px 16px ${C.wine}60`}}>
              + Nueva Cena
            </button>
          </>
        ):(
          // Vista acumulado
          <div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
              <KPICard title="Total cenas"   value={cenas.length}  color={C.wine}/>
              <KPICard title="Comensales"    value={cenas.reduce((s,c)=>s+calcCena(c).nCom,0)} color={C.blue}/>
              <KPICard title="Resultado acum." value={fmt(totalAcum)} color={totalAcum>=0?C.green:C.red}/>
            </div>
            {[...cenas].sort((a,b)=>a.fecha.localeCompare(b.fecha)).reduce((acc,c)=>{
              const r=calcCena(c);
              const prev=acc.length>0?acc[acc.length-1].acum:0;
              return [...acc,{...c,...r,acum:prev+r.resultado}];
            },[]).map((c,i)=>(
              <div key={c.id} style={{...Cd,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}} onClick={()=>{setSelCena(c.id);setPag("cena_detalle");}}>
                <div>
                  <div style={{fontWeight:700,fontSize:13,color:C.wine}}>{c.nombre}</div>
                  <div style={{fontSize:11,color:C.textS}}>{ffec(c.fecha)} . {c.nCom} com.</div>
                </div>
                <div style={{display:"flex",gap:12,alignItems:"center"}}>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:11,color:C.textS}}>Resultado</div>
                    <div style={{fontWeight:800,fontSize:13,color:c.resultado>=0?C.green:C.red}}>{fmt(c.resultado)}</div>
                  </div>
                  <div style={{textAlign:"right",borderLeft:`2px solid ${c.acum>=0?C.green:C.red}`,paddingLeft:10}}>
                    <div style={{fontSize:11,color:C.textS}}>Acum.</div>
                    <div style={{fontWeight:900,fontSize:14,color:c.acum>=0?C.green:C.red}}>{fmt(c.acum)}</div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Modal nueva cena */}
      {modal&&<div style={{position:"absolute",inset:0,background:"rgba(44,24,16,0.6)",display:"flex",alignItems:"flex-end",zIndex:50}}>
        <div style={{background:C.surface,borderRadius:"20px 20px 0 0",padding:24,width:"100%",boxSizing:"border-box"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:18}}>
            <span style={{fontFamily:"Georgia,serif",fontSize:18,fontWeight:800,color:C.wine}}>Nueva Cena</span>
            <button onClick={()=>setModal(false)} style={{background:"none",border:"none",fontSize:20,color:C.textS,cursor:"pointer"}}>x</button>
          </div>
          <label style={Lb}>Nombre del evento</label>
          <input style={{...Ip,marginBottom:14}} value={fNombre} onChange={e=>setFNombre(e.target.value)} placeholder="Cena de Junio..."/>
          <label style={Lb}>Fecha (AAAA-MM-DD)</label>
          <input style={{...Ip,marginBottom:18}} value={fFecha} onChange={e=>setFFecha(e.target.value)} placeholder="2025-06-14"/>
          <div style={{background:C.cream,borderRadius:10,padding:"12px",marginBottom:18,border:`1px solid ${C.border}`}}>
            <div style={{fontSize:10,fontWeight:700,color:C.wine,textTransform:"uppercase",marginBottom:8}}>Costes fijos preconfigurados</div>
            {[["Cocinero y servicio","300 EUR"],["Limpieza","50 EUR"],["Alquiler extraordinario","110 EUR"]].map(([l,v])=>(
              <div key={l} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"4px 0",borderBottom:`1px solid ${C.border}`}}>
                <span style={{color:C.textS}}>{l}</span><span style={{fontWeight:700}}>{v}</span>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setModal(false)} style={{...Btn(C.surface,C.wine),flex:1,border:`1.5px solid ${C.wine}`}}>Cancelar</button>
            <button onClick={handleCrear} style={{...Btn(C.wine),flex:2,padding:"12px"}}>Crear cena</button>
          </div>
        </div>
      </div>}
    </div>
  );
}

// -- DETALLE CENA ---------------------------------------------------------------
function CenaDetalle({cenaId,cenas,setCenas,socios,teso,setTeso,setPag,readonly}){
  const cena = cenas.find(c=>c.id===cenaId);
  const [tab,setTab]=useState("asistencia");
  const [invText,setInvText]=useState({});
  const [adelTmp,setAdelTmp]=useState({});
  const [catActiva,setCatActiva]=useState("comida");
  const [toast,setToast]=useState("");

  const updCena=fn=>setCenas(p=>p.map(c=>c.id===cenaId?fn(c):c));
  const setEstado=(socioId,estado)=>updCena(c=>({...c,asistencia:c.asistencia.map(a=>a.socioId===socioId?{...a,estado}:a)}));
  const addInv=(socioId,nombre)=>{if(!nombre.trim())return;updCena(c=>({...c,asistencia:c.asistencia.map(a=>a.socioId===socioId?{...a,invitados:[...a.invitados,{id:Date.now(),nombre,pagado:false,cargoSocio:false}]}:a)}));};
  const setInvEst=(socioId,invId,pagado,cargoSocio)=>updCena(c=>({...c,asistencia:c.asistencia.map(a=>a.socioId===socioId?{...a,invitados:a.invitados.map(i=>i.id===invId?{...i,pagado,cargoSocio}:i)}:a)}));
  const rmInv=(socioId,invId)=>updCena(c=>({...c,asistencia:c.asistencia.map(a=>a.socioId===socioId?{...a,invitados:a.invitados.filter(i=>i.id!==invId)}:a)}));
  const setCF=(campo,val)=>updCena(c=>({...c,costes:{...(c.costes||CF_DEFAULT),[campo]:parseFloat(val)||0}}));
  const setAdel=(socioId,concepto,importe,cat)=>updCena(c=>({...c,adelantos:[...c.adelantos.filter(a=>a.cat!==cat),{id:Date.now(),socioId,concepto,importe,cat}]}));

  const cerrar=()=>{
    const r=calcCena(cena);
    updCena(c=>({...c,cerrada:true}));
    setTeso(p=>({...p,caja:p.caja+r.ingConf}));
    const msg=`Cena cerrada. ${fmt(r.ingConf)} ingresados en caja.`;
    setToast(msg);
    setTimeout(()=>{setToast("");setPag("cena_lista");},3500);
  };

  if(!cena) return null;
  const {ingConf,ingPend,nCom,totalAdel,totalCF,potencial,resultado}=calcCena(cena);

  const META={
    comida:{defSocio:1,color:C.wine,nota:"Habitual: Oscar Bustos"},
    bebida:{defSocio:9,color:C.blue,nota:"Habitual: Roberto G."},
    menaje:{defSocio:8,color:C.green,nota:"Habitual: Blas Barbero"},
  };

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",position:"relative"}}>
      {/* Toast */}
      {toast&&<div style={{position:"absolute",bottom:70,left:12,right:12,background:C.green,color:"#fff",borderRadius:10,padding:"14px 16px",fontSize:13,fontWeight:700,zIndex:50,textAlign:"center",boxShadow:"0 4px 16px rgba(45,122,79,0.4)"}}>{toast}</div>}

      {/* Header */}
      <div style={{background:C.wineD,padding:"12px 14px 0",flexShrink:0}}>
        <button onClick={()=>setPag("cena_lista")} style={{background:"none",border:"none",color:"rgba(255,255,255,0.6)",cursor:"pointer",fontSize:12,padding:"0 0 8px",fontFamily:"inherit"}}>
          <- Volver
        </button>
        <div style={{fontFamily:"Georgia,serif",fontSize:20,fontWeight:900,color:"#fff",marginBottom:2}}>{cena.nombre}</div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,fontSize:11,color:"rgba(255,255,255,0.5)"}}>
          <span>{ffec(cena.fecha)}</span>
          <span>.</span>
          <span>{nCom} com.</span>
          <span>.</span>
          <SemaforoTag estado={cena.cerrada?"Cerrada":"Abierta"}/>
        </div>
        {/* Mini KPIs en header */}
        <div style={{display:"flex",borderTop:"1px solid rgba(255,255,255,0.1)"}}>
          {[["Cobrado",fmt(ingConf),C.greenL],["Pendiente",fmt(ingPend),ingPend>0?C.red:C.amberL],["Resultado",fmt(Math.abs(resultado)),resultado>=0?C.greenL:C.redL]].map(([l,v,col])=>(
            <div key={l} style={{flex:1,padding:"10px 8px",textAlign:"center",borderRight:"1px solid rgba(255,255,255,0.08)"}}>
              <div style={{fontSize:9,color:"rgba(255,255,255,0.45)",textTransform:"uppercase"}}>{l}</div>
              <div style={{fontWeight:900,fontSize:14,color:col,marginTop:2}}>{v}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Tabs */}
      <div style={{padding:"12px 12px 0",flexShrink:0}}>
        <TabBarH
          tabs={[{key:"asistencia",label:"Asistencia"},{key:"costes",label:"Costes"},{key:"resumen",label:"Resumen"}]}
          active={tab} onChange={setTab}
        />
      </div>

      {/* Contenido scroll */}
      <div style={{flex:1,overflowY:"auto",padding:"0 12px 80px"}}>

        {/* -- TAB ASISTENCIA -- */}
        {tab==="asistencia"&&(
          <>
            {/* Leyenda */}
            <div style={{display:"flex",gap:5,marginBottom:12}}>
              {[["Asiste y paga",C.green],["Pte. pago",C.amber],["No asiste",C.textS]].map(([l,c])=>(
                <div key={l} style={{flex:1,background:c+"18",borderRadius:6,padding:"4px",textAlign:"center",fontSize:9,fontWeight:700,color:c}}>{l}</div>
              ))}
            </div>

            {cena.asistencia.map(a=>{
              const s=socios.find(x=>x.id===a.socioId);
              const asiste=a.estado==="paga"||a.estado==="pendiente";
              const invNoPag=(a.invitados||[]).filter(i=>!i.pagado&&!i.cargoSocio).length;
              const pendG=(a.estado==="pendiente"?PRECIO_COMENSAL:0)+invNoPag*PRECIO_COMENSAL;
              const brd=a.estado==="paga"?C.green+"50":a.estado==="pendiente"?C.amber+"70":C.border;
              return(
                <div key={a.socioId} style={{...Cd,borderColor:brd,borderWidth:1.5}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <div>
                      <div style={{fontWeight:800,fontSize:13,color:asiste?C.text:C.textS}}>{s?.nombre}</div>
                      {asiste&&<div style={{fontSize:10,color:C.textS}}>Grupo: {1+(a.invitados?.length||0)} com. . {fmt((1+(a.invitados?.length||0))*PRECIO_COMENSAL)}</div>}
                    </div>
                    {pendG>0&&<span style={{...Bg(C.red,C.redL),fontSize:10}}>Debe {fmt(pendG)}</span>}
                  </div>
                  {/* 3 botones estado */}
                  <div style={{display:"flex",gap:4,marginBottom:asiste?10:0}}>
                    <EstadoBtn label="Asiste y paga"   active={a.estado==="paga"}      color={C.green} onClick={()=>!cena.cerrada&&setEstado(a.socioId,"paga")}/>
                    <EstadoBtn label="Asiste pte. pago" active={a.estado==="pendiente"} color={C.amber} onClick={()=>!cena.cerrada&&setEstado(a.socioId,"pendiente")}/>
                    <EstadoBtn label="No asiste"        active={a.estado==="no_asiste"} color={C.textS} onClick={()=>!cena.cerrada&&setEstado(a.socioId,"no_asiste")}/>
                  </div>

                  {/* Invitados */}
                  {asiste&&(
                    <div style={{paddingTop:8,borderTop:`1px solid ${C.border}`}}>
                      {(a.invitados||[]).map(i=>{
                        const estado=i.cargoSocio?"socio":i.pagado?"paga":"pendiente";
                        const bg=i.cargoSocio?C.amberL:i.pagado?C.greenL:C.redL;
                        return(
                          <div key={i.id} style={{background:bg,borderRadius:8,padding:"8px 10px",marginBottom:6}}>
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                              <div>
                                <div style={{fontSize:12,fontWeight:700}}>{i.nombre}</div>
                                <div style={{fontSize:10,color:C.textS}}>inv. de {s?.nombre.split(" ")[0]}</div>
                              </div>
                              {!cena.cerrada&&<button onClick={()=>rmInv(a.socioId,i.id)} style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:14}}>x</button>}
                            </div>
                            <div style={{display:"flex",gap:4}}>
                              <EstadoBtn label="Paga invitado" active={estado==="paga"}      color={C.green} onClick={()=>!cena.cerrada&&setInvEst(a.socioId,i.id,true,false)}/>
                              <EstadoBtn label="Pendiente"      active={estado==="pendiente"} color={C.red}   onClick={()=>!cena.cerrada&&setInvEst(a.socioId,i.id,false,false)}/>
                              <EstadoBtn label="Paga socio"     active={estado==="socio"}     color={C.amber} onClick={()=>!cena.cerrada&&setInvEst(a.socioId,i.id,false,true)}/>
                            </div>
                          </div>
                        );
                      })}
                      {/* A-adir invitado */}
                      {!cena.cerrada&&(
                        <div style={{display:"flex",gap:6}}>
                          <input style={{...Ip,flex:1,padding:"6px 10px",fontSize:12}} placeholder="Nombre invitado..." value={invText[a.socioId]||""} onChange={e=>setInvText(p=>({...p,[a.socioId]:e.target.value}))} onKeyDown={e=>{if(e.key==="Enter"){addInv(a.socioId,(invText[a.socioId]||"").trim());setInvText(p=>({...p,[a.socioId]:""}));}}}/>
                          <button onClick={()=>{addInv(a.socioId,(invText[a.socioId]||"").trim());setInvText(p=>({...p,[a.socioId]:""}));}} style={{...Btn(C.green),padding:"6px 12px",fontSize:12}}>+ Inv.</button>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              );
            })}

            {/* Total ingresos */}
            <div style={{...Cd,background:C.green+"0A",borderColor:C.green+"40"}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:5}}>
                <span style={{color:C.textS}}>Cobrado</span><span style={{fontWeight:800,color:C.green}}>{fmt(ingConf)}</span>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:8}}>
                <span style={{color:C.textS}}>Pendiente</span><span style={{fontWeight:800,color:ingPend>0?C.red:C.textS}}>{fmt(ingPend)}</span>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontWeight:900,fontSize:15,borderTop:`1px solid ${C.green}30`,paddingTop:8}}>
                <span>TOTAL POTENCIAL</span><span style={{color:C.green}}>{fmt(potencial)}</span>
              </div>
            </div>
          </>
        )}

        {/* -- TAB COSTES -- */}
        {tab==="costes"&&(
          <>
            {/* Costes fijos */}
            <div style={{fontWeight:800,fontSize:13,color:C.text,marginBottom:10}}>Costes fijos</div>
            <div style={Cd}>
              {[["cocinero","Cocinero y servicio",C.amber],["limpieza","Limpieza",C.blue],["alquiler","Alquiler extraordinario",C.wine]].map(([campo,label,col])=>(
                <div key={campo} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:`1px solid ${C.border}`}}>
                  <div style={{width:4,height:"100%",background:col,borderRadius:2,alignSelf:"stretch"}}/>
                  <span style={{flex:1,fontSize:13,color:C.text}}>{label}</span>
                  {cena.cerrada
                    ?<span style={{fontWeight:800,color:col,fontSize:15}}>{fmt((cena.costes||CF_DEFAULT)[campo]||0)}</span>
                    :<input style={{...Ip,width:85,textAlign:"right",fontWeight:700,fontSize:14,padding:"5px 9px"}} type="number" min="0" value={(cena.costes||CF_DEFAULT)[campo]||""} placeholder="0" onChange={e=>setCF(campo,e.target.value)}/>
                  }
                  <span style={{fontSize:12,color:C.textS}}>EUR</span>
                </div>
              ))}
              <div style={{display:"flex",justifyContent:"space-between",paddingTop:10,fontWeight:900,fontSize:14}}>
                <span>Total costes fijos</span><span style={{color:C.amber}}>{fmt(totalCF)}</span>
              </div>
            </div>

            {/* Anticipos */}
            <div style={{fontWeight:800,fontSize:13,color:C.text,marginBottom:10,marginTop:4}}>Anticipos de compra</div>
            <div style={{display:"flex",gap:5,marginBottom:12}}>
              {["comida","bebida","menaje"].map(cat=>{
                const ad=cena.adelantos?.find(a=>a.cat===cat);
                const on=catActiva===cat;
                const col=META[cat].color;
                return(
                  <button key={cat} onClick={()=>setCatActiva(cat)} style={{flex:1,border:`2px solid ${on?col:C.border}`,background:on?col:"#fff",color:on?"#fff":C.textS,borderRadius:8,padding:"8px 4px",cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:11,textAlign:"center"}}>
                    <div>{cat.charAt(0).toUpperCase()+cat.slice(1)}</div>
                    {ad?.importe>0&&<div style={{fontSize:9,marginTop:2,opacity:0.85}}>{fmt(ad.importe)}</div>}
                  </button>
                );
              })}
            </div>

            {["comida","bebida","menaje"].map(cat=>{
              if(catActiva!==cat) return null;
              const meta=META[cat];
              const ad=cena.adelantos?.find(a=>a.cat===cat);
              const tv=adelTmp[cat]||{socioId:ad?.socioId||meta.defSocio,concepto:ad?.concepto||"",importe:ad?.importe||""};
              const adImporte=ad?.importe||0;
              const asistRec=cena.asistencia?.find(a=>a.socioId===(ad?.socioId||meta.defSocio));
              const asiste=asistRec&&(asistRec.estado==="paga"||asistRec.estado==="pendiente");
              const invNA=(asistRec?.invitados||[]).filter(i=>i.cargoSocio||!i.pagado).length;
              const nCarg=(asiste?1:0)+invNA;
              const pagoCena=nCarg*PRECIO_COMENSAL;
              const dif=adImporte-pagoCena;
              const socioAd=socios.find(s=>s.id===(ad?.socioId||meta.defSocio));
              return(
                <div key={cat}>
                  {!cena.cerrada&&(
                    <div style={{...Cd,borderColor:meta.color+"40"}}>
                      <div style={{fontSize:11,color:meta.color,fontWeight:700,marginBottom:12}}>{meta.nota}</div>
                      <label style={Lb}>Socio que adelanta</label>
                      <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:12}}>
                        {socios.map(s=>(
                          <button key={s.id} onClick={()=>setAdelTmp(p=>({...p,[cat]:{...tv,socioId:s.id}}))} style={{border:`1.5px solid ${tv.socioId===s.id?meta.color:C.border}`,background:tv.socioId===s.id?meta.color:"#fff",color:tv.socioId===s.id?"#fff":C.textS,borderRadius:20,padding:"4px 11px",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit"}}>
                            {s.nombre.split(" ")[0]}
                          </button>
                        ))}
                      </div>
                      <label style={Lb}>Concepto</label>
                      <input style={{...Ip,marginBottom:10}} value={tv.concepto} onChange={e=>setAdelTmp(p=>({...p,[cat]:{...tv,concepto:e.target.value}}))} placeholder="Mercadona, carniceria..."/>
                      <label style={Lb}>Importe (EUR)</label>
                      <input style={{...Ip,fontSize:18,fontWeight:700,marginBottom:12}} type="number" min="0" value={tv.importe} onChange={e=>setAdelTmp(p=>({...p,[cat]:{...tv,importe:e.target.value}}))} placeholder="0"/>
                      <button style={{...Btn(meta.color),width:"100%",padding:"11px"}} onClick={()=>setAdel(parseInt(tv.socioId),tv.concepto,parseFloat(tv.importe)||0,cat)}>
                        Guardar anticipo de {cat}
                      </button>
                    </div>
                  )}

                  {/* 3 filas devoluci-n */}
                  {adImporte>0&&(
                    <div style={{borderRadius:10,overflow:"hidden",border:`1.5px solid ${meta.color}40`,marginBottom:10}}>
                      {/* Cabecera */}
                      <div style={{padding:"10px 14px",background:meta.color+"15",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <div>
                          <div style={{fontSize:10,fontWeight:800,color:meta.color,textTransform:"uppercase",letterSpacing:0.8,marginBottom:2}}>{cat}</div>
                          <div style={{fontWeight:800,fontSize:14,color:C.text}}>{socioAd?.nombre}</div>
                          {ad?.concepto&&<div style={{fontSize:11,color:C.textS}}>{ad.concepto}</div>}
                        </div>
                      </div>
                      {/* Fila 1 */}
                      <div style={{display:"flex",justifyContent:"space-between",padding:"10px 14px",borderBottom:`1px solid ${C.border}`,background:"#fff"}}>
                        <span style={{fontSize:13,color:C.text}}>Anticipo {cat}</span>
                        <span style={{fontWeight:800,fontSize:15,color:meta.color}}>{fmt(adImporte)}</span>
                      </div>
                      {/* Fila 2 */}
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"10px 14px",borderBottom:`1px solid ${C.border}`,background:C.cream}}>
                        <div>
                          <div style={{fontSize:13,color:C.text}}>Pago cena socio + invitados</div>
                          <div style={{fontSize:10,color:C.textS}}>{asiste?"el":"-"}{invNA>0?` + ${invNA} inv.`:""} . {nCarg} x {fmt(PRECIO_COMENSAL)}</div>
                        </div>
                        <span style={{fontWeight:800,fontSize:14,color:C.red}}>- {fmt(pagoCena)}</span>
                      </div>
                      {/* Fila 3 */}
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px",background:dif>=0?C.greenL:C.redL}}>
                        <span style={{fontSize:13,fontWeight:800,color:dif>=0?C.green:C.red}}>
                          {dif>0?`A devolver a ${socioAd?.nombre.split(" ")[0]}`:dif<0?`A pagar por ${socioAd?.nombre.split(" ")[0]}`:"Liquidado"}
                        </span>
                        <span style={{fontWeight:900,fontSize:18,color:dif>=0?C.green:C.red}}>{dif===0?"0 EUR":fmt(dif)}</span>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}

            {/* Total gastos */}
            <div style={{...Cd,background:C.red+"08"}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}><span style={{color:C.textS}}>Total anticipos</span><span style={{fontWeight:800,color:C.red}}>{fmt(totalAdel)}</span></div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:8}}><span style={{color:C.textS}}>Total costes fijos</span><span style={{fontWeight:800,color:C.amber}}>{fmt(totalCF)}</span></div>
              <div style={{display:"flex",justifyContent:"space-between",fontWeight:900,fontSize:15,borderTop:`1px solid ${C.border}`,paddingTop:8}}><span>Total gastos cena</span><span style={{color:C.red}}>{fmt(totalAdel+totalCF)}</span></div>
            </div>
          </>
        )}

        {/* -- TAB RESUMEN -- */}
        {tab==="resumen"&&(
          <>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
              <KPICard title="Comensales"    value={nCom}              color={C.wine}/>
              <KPICard title="Cobrado"       value={fmt(ingConf)}      color={C.green}/>
              <KPICard title="Pte. cobrar"   value={fmt(ingPend)}      color={ingPend>0?C.red:C.textS}/>
              <KPICard title="Coste total"   value={fmt(totalAdel+totalCF)} color={C.red}/>
            </div>

            {/* Cobros pendientes */}
            {(()=>{
              const d=[];
              cena.asistencia?.forEach(a=>{
                const s=socios.find(x=>x.id===a.socioId);
                if(a.estado==="pendiente") d.push({nombre:s?.nombre,concepto:"Plaza propia",importe:PRECIO_COMENSAL});
                (a.invitados||[]).filter(i=>!i.pagado&&!i.cargoSocio).forEach(i=>d.push({nombre:i.nombre,concepto:`Inv. de ${s?.nombre.split(" ")[0]}`,importe:PRECIO_COMENSAL}));
              });
              if(!d.length) return null;
              return(
                <div style={{...Cd,borderColor:C.red+"50"}}>
                  <div style={{fontWeight:800,fontSize:13,color:C.red,marginBottom:10}}>Cobros pendientes - {fmt(d.reduce((a,x)=>a+x.importe,0))}</div>
                  {d.map((x,i)=>(
                    <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:`1px solid ${C.border}`,fontSize:13}}>
                      <div><div style={{fontWeight:700}}>{x.nombre}</div><div style={{fontSize:10,color:C.textS}}>{x.concepto}</div></div>
                      <span style={{fontWeight:800,color:C.red}}>{fmt(x.importe)}</span>
                    </div>
                  ))}
                </div>
              );
            })()}

            {/* Resultado final */}
            <div style={{...Cd,background:resultado>=0?C.greenL:C.redL,border:`2px solid ${resultado>=0?C.green:C.red}`}}>
              <div style={{fontWeight:800,fontSize:13,color:C.text,marginBottom:12,textAlign:"center"}}>Resultado Final</div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:5}}>
                <span style={{color:C.textS}}>{nCom} com. x {fmt(PRECIO_COMENSAL)}</span><span style={{fontWeight:700,color:C.green}}>{fmt(potencial)}</span>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:5}}>
                <span style={{color:C.textS}}>- Compra comida</span><span style={{fontWeight:700,color:C.red}}>{fmt(totalAdel)}</span>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:12}}>
                <span style={{color:C.textS}}>- Costes fijos</span><span style={{fontWeight:700,color:C.amber}}>{fmt(totalCF)}</span>
              </div>
              <div style={{background:"#fff",borderRadius:10,padding:"16px",border:`2px solid ${resultado>=0?C.green:C.red}`,textAlign:"center"}}>
                <div style={{fontWeight:800,fontSize:14,color:resultado>=0?C.green:C.red,marginBottom:6}}>{resultado>=0?"SUPERAVIT":"DEFICIT"}</div>
                <div style={{fontWeight:900,fontSize:34,color:resultado>=0?C.green:C.red}}>{fmt(Math.abs(resultado))}</div>
                {resultado>0&&<div style={{fontSize:11,color:C.green,marginTop:6}}>Pasa al fondo de la sociedad</div>}
              </div>
            </div>
          </>
        )}
      </div>

      {/* Bot-n cerrar - footer fijo */}
      {!cena.cerrada&&(
        <div style={{position:"absolute",bottom:0,left:0,right:0,padding:"10px 12px",background:C.surface,borderTop:`1px solid ${C.border}`,flexShrink:0}}>
          {!readonly&&<button onClick={cerrar} style={{...Btn(C.wine),width:"100%",padding:"14px",fontSize:14,borderRadius:12,boxShadow:`0 4px 12px ${C.wine}50`}}>Cerrar y archivar cena</button>}
        </div>
      )}
    </div>
  );
}

// -- SOCIOS ---------------------------------------------------------------------
function Socios({socios,setSocios,cenas,cuotas,readonly}){
  const [exp,setExp]=useState(null);
  const [modalNuevo,setModalNuevo]=useState(false);
  const [form,setForm]=useState({nombre:"",numero:"",formaPago:"Transferencia",fechaAlta:""});
  const [errForm,setErrForm]=useState("");

  const deudasSocio=(sid)=>{
    const items=[];
    cenas.forEach(c=>{
      const a=c.asistencia?.find(x=>x.socioId===sid);
      if(!a)return;
      if(a.estado==="pendiente")items.push({cena:c.nombre,txt:"Plaza propia",imp:PRECIO_COMENSAL});
      (a.invitados||[]).filter(i=>!i.pagado&&!i.cargoSocio).forEach(i=>
        items.push({cena:c.nombre,txt:`Inv. ${i.nombre}`,imp:PRECIO_COMENSAL})
      );
    });
    return items;
  };

  const guardarNuevo=()=>{
    if(!form.nombre.trim()){setErrForm("El nombre es obligatorio");return;}
    if(!form.numero.trim()){setErrForm("El numero de socio es obligatorio");return;}
    if(socios.find(s=>s.numero===form.numero.trim())){setErrForm("Ese numero de socio ya existe");return;}
    const nuevo={
      id:Date.now(),
      nombre:form.nombre.trim(),
      numero:form.numero.trim().padStart(3,"0"),
      formaPago:form.formaPago,
      fechaAlta:form.fechaAlta||new Date().toISOString().slice(0,10),
    };
    setSocios(prev=>[...prev,nuevo]);
    setModalNuevo(false);
    setForm({nombre:"",numero:"",formaPago:"Transferencia",fechaAlta:""});
    setErrForm("");
  };

  const darBaja=(id)=>{
    if(!window.confirm("Dar de baja a este socio?"))return;
    setSocios(prev=>prev.filter(s=>s.id!==id));
  };

  return(
    <div>
      <div style={{background:C.wineD,padding:"14px 14px 14px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontFamily:"Georgia,serif",fontSize:18,fontWeight:900,color:"#fff"}}>Socios</div>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.45)",marginTop:3}}>{socios.length} socios activos</div>
          </div>
          {!readonly&&(
            <button onClick={()=>setModalNuevo(true)} style={{background:C.gold,border:"none",color:"#fff",borderRadius:9,padding:"8px 14px",cursor:"pointer",fontWeight:700,fontSize:12,fontFamily:"inherit"}}>
              + Nuevo socio
            </button>
          )}
        </div>
      </div>
      <div style={{padding:12}}>
        {socios.map(s=>{
          const cuotasS=cuotas.filter(c=>c.socioId===s.id);
          const deudas=deudasSocio(s.id);
          const totalD=deudas.reduce((a,d)=>a+d.imp,0);
          const isExp=exp===s.id;
          return(
            <div key={s.id} style={{...Cd,borderColor:totalD>0?C.red+"40":C.border,borderWidth:totalD>0?1.5:1}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}} onClick={()=>setExp(isExp?null:s.id)}>
                <div>
                  <div style={{fontWeight:800,fontSize:14}}>{s.nombre}</div>
                  <div style={{fontSize:11,color:C.textS,marginTop:2}}>#{s.numero} - {s.formaPago} - {cuotasS.length} cuotas</div>
                </div>
                <div style={{alignItems:"flex-end",textAlign:"right"}}>
                  <div style={{fontWeight:800,fontSize:14,color:totalD>0?C.red:C.green}}>{totalD>0?fmt(totalD):"Al dia"}</div>
                  <div style={{fontSize:10,color:C.textS}}>deuda cenas</div>
                </div>
              </div>
              {isExp&&(
                <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${C.border}`}}>
                  <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
                    <div style={{background:C.blueL,borderRadius:8,padding:"6px 12px",fontSize:11}}>
                      <span style={{color:C.textS}}>Cuotas: </span>
                      <span style={{fontWeight:700,color:C.blue}}>{cuotasS.length} meses / {fmt(cuotasS.reduce((a,p)=>a+p.importe,0))}</span>
                    </div>
                    <div style={{background:C.greenL,borderRadius:8,padding:"6px 12px",fontSize:11}}>
                      <span style={{color:C.textS}}>Cenas: </span>
                      <span style={{fontWeight:700,color:C.green}}>{cenas.filter(c=>c.asistencia?.find(a=>a.socioId===s.id&&a.estado!=="no_asiste")).length}</span>
                    </div>
                    {s.fechaAlta&&<div style={{background:C.cream,borderRadius:8,padding:"6px 12px",fontSize:11}}>
                      <span style={{color:C.textS}}>Alta: </span>
                      <span style={{fontWeight:700}}>{ffec(s.fechaAlta)}</span>
                    </div>}
                  </div>
                  {deudas.length>0&&(
                    <div style={{marginBottom:10}}>
                      <div style={{fontSize:10,fontWeight:700,color:C.red,textTransform:"uppercase",marginBottom:6}}>Pendiente de pago:</div>
                      {deudas.map((d,i)=>(
                        <div key={i} style={{background:C.redL,borderRadius:8,padding:"7px 10px",marginBottom:4,display:"flex",justifyContent:"space-between",fontSize:12}}>
                          <span>{d.cena} - {d.txt}</span>
                          <span style={{fontWeight:700,color:C.red}}>{fmt(d.imp)}</span>
                        </div>
                      ))}
                    </div>
                  )}
                  {!readonly&&(
                    <button onClick={()=>darBaja(s.id)} style={{background:"none",border:`1px solid ${C.red}`,color:C.red,borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit"}}>
                      Dar de baja
                    </button>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Modal nuevo socio */}
      {modalNuevo&&(
        <div style={{position:"fixed",inset:0,background:"rgba(44,24,16,0.6)",display:"flex",alignItems:"flex-end",zIndex:50}}>
          <div style={{background:C.surface,borderRadius:"20px 20px 0 0",padding:24,width:"100%",boxSizing:"border-box",maxHeight:"90vh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:18}}>
              <span style={{fontFamily:"Georgia,serif",fontSize:18,fontWeight:800,color:C.wine}}>Nuevo Socio</span>
              <button onClick={()=>{setModalNuevo(false);setErrForm("");}} style={{background:"none",border:"none",fontSize:20,color:C.textS,cursor:"pointer"}}>x</button>
            </div>
            <label style={Lb}>Nombre completo *</label>
            <input style={{...Ip,marginBottom:12}} value={form.nombre} onChange={e=>setForm(p=>({...p,nombre:e.target.value}))} placeholder="Nombre y apellidos"/>
            <div style={{display:"flex",gap:12,marginBottom:12}}>
              <div style={{flex:1}}>
                <label style={Lb}>Numero de socio *</label>
                <input style={Ip} value={form.numero} onChange={e=>setForm(p=>({...p,numero:e.target.value}))} placeholder={String(socios.length+1).padStart(3,"0")}/>
              </div>
              <div style={{flex:1}}>
                <label style={Lb}>Fecha de alta</label>
                <input style={Ip} type="date" value={form.fechaAlta} onChange={e=>setForm(p=>({...p,fechaAlta:e.target.value}))}/>
              </div>
            </div>
            <label style={Lb}>Forma de pago</label>
            <select style={{...Ip,marginBottom:18}} value={form.formaPago} onChange={e=>setForm(p=>({...p,formaPago:e.target.value}))}>
              {["Transferencia","Bizum","Caja","Efectivo"].map(m=><option key={m}>{m}</option>)}
            </select>
            {errForm&&<div style={{color:C.red,fontSize:12,fontWeight:700,marginBottom:12}}>{errForm}</div>}
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>{setModalNuevo(false);setErrForm("");}} style={{...Btn(C.surface,C.wine),flex:1,border:`1.5px solid ${C.wine}`}}>Cancelar</button>
              <button onClick={guardarNuevo} style={{...Btn(C.wine),flex:2,padding:"12px"}}>Dar de alta</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function PagosPendientes({cenas,setCenas,socios,cuotas,setCuotas,teso,setTeso,readonly}){
  const [filtro,setFiltro]=useState("todos");
  const pendientes=useMemo(()=>{
    const items=[];
    cenas.forEach(c=>{
      c.asistencia?.forEach(a=>{
        const s=socios.find(x=>x.id===a.socioId);
        if(a.estado==="pendiente") items.push({id:`cena-${c.id}-soc-${a.socioId}`,tipo:"socio",nombre:s?.nombre,concepto:`Plaza cena - ${c.nombre}`,importe:PRECIO_COMENSAL,cenaId:c.id,socioId:a.socioId});

function BarChart({data, height=120, colorFn}){
  if(!data.length) return null;
  const max=Math.max(...data.map(d=>Math.max(d.a||0,d.b||0,d.v||0)),1);
  const W=100/data.length;
  return(
    <div style={{position:"relative",height,display:"flex",alignItems:"flex-end",gap:2,padding:"0 4px"}}>
      {/* L-neas gu-a */}
      {[0,0.5,1].map(p=>(
        <div key={p} style={{position:"absolute",left:0,right:0,bottom:`${p*100}%`,borderTop:`1px dashed ${C.border}`,pointerEvents:"none"}}/>
      ))}
      {data.map((d,i)=>{
        const hA=d.a!=null?(d.a/max*100):null;
        const hB=d.b!=null?(d.b/max*100):null;
        const hV=d.v!=null?(d.v/max*100):null;
        return(
          <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,position:"relative"}}>
            {hA!=null&&hB!=null?(
              <div style={{width:"100%",display:"flex",gap:1,alignItems:"flex-end",height}}>
                <div style={{flex:1,height:`${hA}%`,background:C.green,borderRadius:"3px 3px 0 0",minHeight:2}}/>
                <div style={{flex:1,height:`${hB}%`,background:C.red+"cc",borderRadius:"3px 3px 0 0",minHeight:2}}/>
              </div>
            ):hV!=null?(
              <div style={{width:"70%",height:`${hV}%`,background:colorFn?colorFn(d,i):C.wine,borderRadius:"3px 3px 0 0",minHeight:2,alignSelf:"flex-end"}}/>
            ):null}
            <div style={{fontSize:8,color:C.textS,textAlign:"center",marginTop:3,lineHeight:1.2}}>{d.label}</div>
          </div>
        );
      })}
    </div>
  );
}

function DonutChart({segments,size=120}){
  const total=segments.reduce((s,x)=>s+x.valor,0)||1;
  let acum=0;
  const R=46,cx=60,cy=60,stroke=14;
  const paths=segments.map(seg=>{
    const pct=seg.valor/total;
    const a1=acum*Math.PI*2-Math.PI/2;
    const a2=(acum+pct)*Math.PI*2-Math.PI/2;
    acum+=pct;
    const x1=cx+R*Math.cos(a1),y1=cy+R*Math.sin(a1);
    const x2=cx+R*Math.cos(a2),y2=cy+R*Math.sin(a2);
    const large=pct>0.5?1:0;
    return{...seg,d:`M ${cx} ${cy} L ${x1} ${y1} A ${R} ${R} 0 ${large} 1 ${x2} ${y2} Z`};
  });
  return(
    <svg width={size} height={size} viewBox="0 0 120 120">
      <circle cx={cx} cy={cy} r={R+stroke/2} fill="none" stroke={C.border} strokeWidth={stroke}/>
      {paths.map((p,i)=>(
        <path key={i} d={p.d} fill={p.color} opacity={0.9}/>
      ))}
      <circle cx={cx} cy={cy} r={R-stroke/2+1} fill={C.surface}/>
    </svg>
  );
}

function Tesoreria({teso,setTeso,cenas,socios,cuotas,facturas,setFacturas,readonly}){
  const [modalF,setModalF]=useState(false);
  const setTesoSafe=(k,v)=>{if(readonly||!setTeso)return;setTeso(p=>({...p,[k]:parseFloat(v)||0}));};
  const [nF,setNF]=useState({concepto:"",importe:"",cat:"Cocinero",venc:""});
  const totalDisp=teso.caja+teso.banco+teso.bizum;
  const pendCobrar=cenas.reduce((s,c)=>s+calcCena(c).ingPend,0);
  const pendPagar=facturas.filter(f=>!f.pagado).reduce((s,f)=>s+f.importe,0);
  const saldoFut=totalDisp+pendCobrar-pendPagar;
  const saveF=()=>{if(!nF.concepto||!nF.importe)return;setFacturas(p=>[...p,{...nF,id:Date.now(),importe:parseFloat(nF.importe),pagado:false}]);setModalF(false);setNF({concepto:"",importe:"",cat:"Cocinero",venc:""});};

  return(
    <div>
      <div style={{background:C.wineD,padding:"14px 14px 14px"}}>
        <div style={{fontFamily:"Georgia,serif",fontSize:18,fontWeight:900,color:"#fff"}}>Tesoreria</div>
        <div style={{fontSize:11,color:"rgba(255,255,255,0.5)",marginTop:3}}>Vision financiera de la sociedad</div>
      </div>
      <div style={{padding:12}}>
        {/* KPIs */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
          <KPICard title="Dinero disponible" value={fmt(totalDisp)}   color={C.green}/>
          <KPICard title="Saldo real futuro"  value={fmt(saldoFut)}   color={saldoFut>=0?C.green:C.red}/>
          <KPICard title="Pendiente cobrar"  value={fmt(pendCobrar)}  color={pendCobrar>0?C.blue:C.textS}/>
          <KPICard title="Pendiente pagar"   value={fmt(pendPagar)}   color={pendPagar>0?C.amber:C.textS}/>
        </div>

        {/* Cuentas editables */}
        <div style={Cd}>
          <div style={{fontWeight:800,fontSize:13,marginBottom:12}}>Dinero disponible</div>
          {[["caja","Caja",C.wine],["banco","Banco",C.blue],["bizum","Bizum",C.green]].map(([k,l,c])=>(
            <div key={k} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:`1px solid ${C.border}`}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:c,flexShrink:0}}/>
              <span style={{flex:1,fontSize:13}}>{l}</span>
              <input style={{...Ip,width:100,textAlign:"right",fontWeight:700,fontSize:14,padding:"5px 9px"}} type="number" value={teso[k]||""} onChange={e=>setTesoSafe(k,e.target.value)} disabled={readonly} placeholder="0"/>
              <span style={{fontSize:12,color:C.textS}}>EUR</span>
            </div>
          ))}
          <div style={{display:"flex",justifyContent:"space-between",paddingTop:10,fontWeight:900,fontSize:14}}>
            <span>Total</span><span style={{color:C.green}}>{fmt(totalDisp)}</span>
          </div>
        </div>

        {/* Facturas */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontWeight:800,fontSize:13}}>Facturas pendientes</div>
          <button onClick={()=>setModalF(true)} style={{...Btn(C.wine),padding:"6px 12px",fontSize:11}}>+ Anadir</button>
        </div>
        {facturas.map(f=>(
          <div key={f.id} style={{...Cd,display:"flex",alignItems:"center",gap:10,background:f.pagado?C.greenL:C.surface}}>
            <span style={{fontSize:18}}>{f.pagado?"[ok]":"[!]"}</span>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:13}}>{f.concepto}</div>
              <div style={{fontSize:10,color:C.textS}}>{f.cat}{f.venc&&` . vence ${ffec(f.venc)}`}</div>
            </div>
            <span style={{fontWeight:800,fontSize:14,color:f.pagado?C.green:C.red}}>{fmt(f.importe)}</span>
            <button onClick={()=>setFacturas(p=>p.map(x=>x.id===f.id?{...x,pagado:!x.pagado}:x))} style={{...Btn(f.pagado?C.border:C.green,f.pagado?C.textS:"#fff"),padding:"6px 10px",fontSize:10}}>
              {f.pagado?"Desmarcar":"Pagado"}
            </button>
          </div>
        ))}
      </div>

      {modalF&&<div style={{position:"absolute",inset:0,background:"rgba(44,24,16,0.6)",display:"flex",alignItems:"flex-end",zIndex:50}}>
        <div style={{background:C.surface,borderRadius:"20px 20px 0 0",padding:24,width:"100%",boxSizing:"border-box"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:18}}>
            <span style={{fontFamily:"Georgia,serif",fontSize:18,fontWeight:800,color:C.wine}}>Nueva Factura</span>
            <button onClick={()=>setModalF(false)} style={{background:"none",border:"none",fontSize:20,color:C.textS,cursor:"pointer"}}>x</button>
          </div>
          <label style={Lb}>Concepto</label>
          <input style={{...Ip,marginBottom:12}} value={nF.concepto} onChange={e=>setNF(p=>({...p,concepto:e.target.value}))} placeholder="Cocinero junio..."/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
            <div><label style={Lb}>Importe EUR</label><input style={Ip} type="number" value={nF.importe} onChange={e=>setNF(p=>({...p,importe:e.target.value}))}/></div>
            <div><label style={Lb}>Vencimiento</label><input style={Ip} type="date" value={nF.venc} onChange={e=>setNF(p=>({...p,venc:e.target.value}))}/></div>
          </div>
          <label style={Lb}>Categoria</label>
          <select style={{...Ip,marginBottom:18}} value={nF.cat} onChange={e=>setNF(p=>({...p,cat:e.target.value}))}>
            {["Cocinero","Limpieza","Alquiler","Bebida","Comida","Menaje","Otro"].map(c=><option key={c}>{c}</option>)}
          </select>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setModalF(false)} style={{...Btn(C.surface,C.wine),flex:1,border:`1.5px solid ${C.wine}`}}>Cancelar</button>
            <button onClick={saveF} style={{...Btn(C.wine),flex:2,padding:"12px"}}>Guardar</button>
          </div>
        </div>
      </div>}
    </div>
  );
}
